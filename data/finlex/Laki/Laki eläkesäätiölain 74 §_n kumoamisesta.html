<h1>Laki eläkesäätiölain 74 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 29 päivänä joulukuuta 1995 annetun eläkesäätiölain (1774/1995) 74 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 2010.</p>
