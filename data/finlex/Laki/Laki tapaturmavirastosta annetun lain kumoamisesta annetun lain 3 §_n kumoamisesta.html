<h1>Laki tapaturmavirastosta annetun lain kumoamisesta annetun lain 3 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tapaturmavirastosta annetun lain kumoamisesta annetun lain (1528/1995) 3 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 13 päivänä marraskuuta 2024.</p>
