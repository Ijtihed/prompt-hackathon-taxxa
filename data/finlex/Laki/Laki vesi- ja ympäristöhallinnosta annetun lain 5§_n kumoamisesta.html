<h1>Laki vesi- ja ympäristöhallinnosta annetun lain 5§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan vesi- ja ympäristöhallinnosta 17 päivänä tammikuuta 1986 annetun lain (24/86) 5§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
