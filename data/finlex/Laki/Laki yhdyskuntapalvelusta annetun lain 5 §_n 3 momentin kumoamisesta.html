<h1>Laki yhdyskuntapalvelusta annetun lain 5 §:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan yhdyskuntapalvelusta 12 päivänä joulukuuta 1996 annetun lain (1055/1996) 5 §:n 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2006.</p>
