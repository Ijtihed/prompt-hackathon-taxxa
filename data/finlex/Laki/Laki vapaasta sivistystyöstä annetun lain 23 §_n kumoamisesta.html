<h1>Laki vapaasta sivistystyöstä annetun lain 23 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan vapaasta sivistystyöstä annetun lain (632/1998) 23 §, sellaisena kuin se on laissa 1304/2016.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2024.</p>
