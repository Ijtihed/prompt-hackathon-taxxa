<h1>Laki nuorisolain 26 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan nuorisolain (1285/2016) 26 §, sellaisena kuin se on laissa 1303/2016.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2024.</p>
