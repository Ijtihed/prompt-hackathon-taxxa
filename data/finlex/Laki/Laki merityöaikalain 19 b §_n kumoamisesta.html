<h1>Laki merityöaikalain 19 b §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan merityöaikalain (296/1976) 19 b §, sellaisena kuin se on laeissa 969/2008 ja 1026/2011.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2014.</p>
