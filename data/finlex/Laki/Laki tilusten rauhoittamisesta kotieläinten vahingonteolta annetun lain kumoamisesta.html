<h1>Laki tilusten rauhoittamisesta kotieläinten vahingonteolta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tilusten rauhoittamisesta kotieläinten vahingonteolta annettu laki (47/1921).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2017. </p>
