<h1>Laki virvoitusjuomaverosta annetun lain muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>
                                Tällä lailla kumotaan virvoitusjuomaverosta annetun lain muuttamisesta annettu laki 
                                <a href="https://www.finlex.fi/akn/fi/act/statute/2023/651" rel="noopener noreferrer" target="_blank">(651/2023)</a>. 
                            </p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 2026.</p>
