<h1>Laki säteilylain 72 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 27 päivänä maaliskuuta 1991 annetun säteilylain (592/1991) 72 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 1998.</p>
