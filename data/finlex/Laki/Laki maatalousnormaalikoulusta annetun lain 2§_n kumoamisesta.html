<h1>Laki maatalousnormaalikoulusta annetun lain 2§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan maatalousnormaalikoulusta 11 päivänä helmikuuta 1927 annetun lain (42/27) 2§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
