<h1>Laki maatilatalouden tuloverolain 10 e §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan maatilatalouden tuloverolain (543/1967) 10 e §:n 4 momentti, sellaisena kuin se on laissa 790/2012.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2014.</p>
