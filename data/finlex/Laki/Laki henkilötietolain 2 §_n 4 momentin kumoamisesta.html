<h1>Laki henkilötietolain 2 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan henkilötietolain (523/1999) 2 §:n 4 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2011.</p>
