<h1>Laki mallioikeuslain 47 §:n muuttamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti</p>
<p>
<i>muutetaan </i>
                        12 päivänä maaliskuuta annetun mallioikeuslain (
                        <a href="https://www.finlex.fi/akn/fi/act/statute/1971/221" rel="noopener noreferrer" target="_blank">221/71</a>
                        ) 47 § 2 momentti seuraavasti:
                    </p>
<h3>47 §</h3>
<p>Tämän lain mukaan perittävistä maksuista säädetään erikseen.</p>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 1993.</p>
