<h1>Laki elintarvikelain 2 §:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan elintarvikelain (23/2006) 2 §:n 3 momentti.</p>

<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2014.</p>
