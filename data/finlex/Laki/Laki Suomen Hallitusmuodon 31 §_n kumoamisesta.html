<h1>Laki Suomen Hallitusmuodon 31 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti, joka on tehty valtiopäiväjärjestyksen 67 §:ssä määrätyllä tavalla, säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Suomen Hallitusmuodon 31 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 15 päivänä elokuuta 1998.</p>
