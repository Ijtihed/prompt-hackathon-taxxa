<h1>Laki jätelain muuttamisesta annetun lain 60 §:n 1 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1  §</h3>
<p>Täten kumotaan jätelain muuttamisesta 29 päivänä joulukuuta 1994 annetun lain (1413/94) 60 §:n 1 momentti.</p>
<h3>2  §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 1995.</p>
