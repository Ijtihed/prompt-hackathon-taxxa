<h1>Laki tullilain 9 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 29 päivänä joulukuuta 1994 annetun tullilain (1466/1994) 9 a §, sellaisena kuin se on laissa 876/2000.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2006.</p>
