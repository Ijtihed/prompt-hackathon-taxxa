<h1>Laki sotaväen kunniatuomioistuimista annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sotaväen kunniatuomioistuimista 30 päivänä kesäkuuta 1919 annettu laki.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 1993.</p>
