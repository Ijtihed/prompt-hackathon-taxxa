<h1>Laki hätäkeskuksia koskevasta kokeilusta annetun lain 7 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan hätäkeskuksia koskevasta kokeilusta 17 päivänä joulukuuta 1993annetun lain (1257/93) 7 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänähuhtikuuta 1996.</p>
