<h1>Laki perintökaaren 5 luvun 2 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan perintökaaren (40/1965) 5 luvun 2 §:n 4 momentti, sellaisena kuin se on laissa 282/1993.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025.</p>
