<h1>Laki Suomen elokuva-arkistosta annetun lain 3§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan Suomen elokuva-arkistosta 24 päivänä marraskuuta 1978 annetun lain (891/78) 3§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 1989.</p>
