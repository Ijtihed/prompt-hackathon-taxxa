<h1>Laki sotilasvammalain 29 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 28 päivänä toukokuuta 1948 annetun sotilasvammalain (404/1948) 29 a §, sellaisena kuin se on laeissa 16/1958 ja 1225/1993.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 1999.</p>
