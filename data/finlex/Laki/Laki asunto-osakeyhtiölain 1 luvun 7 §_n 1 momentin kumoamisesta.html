<h1>Laki asunto-osakeyhtiölain 1 luvun 7 §:n 1 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan asunto-osakeyhtiölain (1599/2009) 1 luvun 7 §:n 1 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2019.</p>
