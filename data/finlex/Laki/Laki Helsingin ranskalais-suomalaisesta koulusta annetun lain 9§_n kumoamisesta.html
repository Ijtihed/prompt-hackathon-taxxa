<h1>Laki Helsingin ranskalais-suomalaisesta koulusta annetun lain 9§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan Helsingin ranskalais-suomalaisesta koulusta 7 päivänä tammikuuta 1977 annetun lain (33/77) 9§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
