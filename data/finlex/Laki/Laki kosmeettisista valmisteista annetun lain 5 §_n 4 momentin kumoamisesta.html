<h1>Laki kosmeettisista valmisteista annetun lain 5 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kosmeettisista valmisteista annetun lain (492/2013) 5 §:n 4 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 2016.</p>
