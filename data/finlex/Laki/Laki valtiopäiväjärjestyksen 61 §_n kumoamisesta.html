<h1>Laki valtiopäiväjärjestyksen 61 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti, joka on tehty valtiopäiväjärjestyksen 67 §:ssä määrätyllä tavalla, säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan valtiopäiväjärjestyksen 61 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 1994.</p>
