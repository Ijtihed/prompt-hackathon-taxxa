<h1>Laki seutuvaltuustokokeilusta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan seutuvaltuustokokeilusta 30 päivänä tammikuuta 2004 annettu laki (62/2004).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2009.</p>
