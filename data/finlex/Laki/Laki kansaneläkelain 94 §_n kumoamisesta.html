<h1>Laki kansaneläkelain 94 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kansaneläkelain (568/2007) 94 §, sellaisena kuin se on osaksi laissa 1151/2007.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2024.</p>
