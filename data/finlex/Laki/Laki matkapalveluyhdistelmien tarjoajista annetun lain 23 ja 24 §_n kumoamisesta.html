<h1>Laki matkapalveluyhdistelmien tarjoajista annetun lain 23 ja 24 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan matkapalveluyhdistelmien tarjoajista annetun lain (921/2017) 23 ja 24 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 25 päivänä kesäkuuta 2023.</p>
