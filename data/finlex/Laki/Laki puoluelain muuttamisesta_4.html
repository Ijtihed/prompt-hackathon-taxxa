<h1>Laki puoluelain muuttamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti</p>
<p>
<i>lisätään</i>
                         puoluelakiin (
                        <a href="https://www.finlex.fi/akn/fi/act/statute/1969/10" rel="noopener noreferrer" target="_blank">10/1969</a>
                        ) uusi 7 a § seuraavasti:
                    </p>
<h3>7 a §</h3>
<p>Puolueen hallituksen jäsenenä saa olla vain henkilö, jolla on asuinpaikka Suomessa.</p>
<p>Tämä laki tulee voimaan 1 päivänä syyskuuta 2010.</p>
