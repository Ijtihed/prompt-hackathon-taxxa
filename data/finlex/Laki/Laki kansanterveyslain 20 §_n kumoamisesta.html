<h1>Laki kansanterveyslain 20 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kansanterveyslain (66/1972) 20 §, sellaisena kuin se on laissa 892/2007.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 2015.</p>
