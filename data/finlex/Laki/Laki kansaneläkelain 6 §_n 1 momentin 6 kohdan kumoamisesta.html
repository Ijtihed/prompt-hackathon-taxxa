<h1>Laki kansaneläkelain 6 §:n 1 momentin 6 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kansaneläkelain (568/2007) 6 §:n 1 momentin 6 kohta, sellaisena kuin se on laissa 84/2016.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2021.</p>
