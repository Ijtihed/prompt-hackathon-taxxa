<h1>Laki kunnallisen virkaehtosopimuslain 26 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kunnallisen virkaehtosopimuslain (669/1970) 26 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 2016.</p>
