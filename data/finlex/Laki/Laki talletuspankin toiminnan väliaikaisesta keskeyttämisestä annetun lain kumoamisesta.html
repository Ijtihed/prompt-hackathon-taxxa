<h1>Laki talletuspankin toiminnan väliaikaisesta keskeyttämisestä annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan talletuspankin toiminnan väliaikaisesta keskeyttämisestä annettu laki (1509/2001).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 2021.</p>
