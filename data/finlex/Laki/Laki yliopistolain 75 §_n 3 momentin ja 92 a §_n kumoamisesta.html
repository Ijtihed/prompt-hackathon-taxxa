<h1>Laki yliopistolain 75 §:n 3 momentin ja 92 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan yliopistolain (558/2009) 75 §:n 3 momentti ja 92 a §, sellaisina kuin ne ovat laissa 1117/2010.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2017.</p>
