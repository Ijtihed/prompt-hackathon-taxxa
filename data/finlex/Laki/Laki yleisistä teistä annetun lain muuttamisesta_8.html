<h1>Laki yleisistä teistä annetun lain muuttamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan yleisistä teistä 21 päivänä toukokuuta 1954 annetun lain (243/1954) 11 luku, sellaisena kuin se on laissa 382/1982.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2001.</p>
