<h1>Laki oikeudenkäymiskaaren 10 luvun 27 §:n kumoamisuta.</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<p>Täten kumotaan oikeudenkäymiskaaren 10 luvun 27 §, sellaisena kuin se on 27 päivänä huhtikuuta 1868 annetussa laissa.</p>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1967.</p>
