<h1>Laki kuntajakolain eräiden säännösten kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kuntajakolain (1698/2009) 29 §:n 2 momentti, 9 luku ja 59 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2013.</p>
