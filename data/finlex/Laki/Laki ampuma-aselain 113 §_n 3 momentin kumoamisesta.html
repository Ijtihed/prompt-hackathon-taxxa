<h1>Laki ampuma-aselain 113 §:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 9 päivänä tammikuuta 1998 annetun ampuma-aselain (1/1998) 113 §:n 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä lokakuuta 2003.</p>
