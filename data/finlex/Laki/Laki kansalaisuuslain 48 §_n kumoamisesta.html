<h1>Laki kansalaisuuslain 48 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kansalaisuuslain (359/2003) 48 §, sellaisena kuin se on laissa 974/2007.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä syyskuuta 2020.</p>
