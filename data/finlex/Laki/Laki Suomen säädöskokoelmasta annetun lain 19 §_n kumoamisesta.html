<h1>Laki Suomen säädöskokoelmasta annetun lain 19 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Suomen säädöskokoelmasta annetun lain (188/2000) 19 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025.</p>
