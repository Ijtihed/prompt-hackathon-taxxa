<h1>Laki valtiokonttorista annetun lain 2 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan valtiokonttorista annetun lain (305/1991) 2 §:n 4 momentti, sellaisena kuin se on laissa 317/2009.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 2014.</p>
