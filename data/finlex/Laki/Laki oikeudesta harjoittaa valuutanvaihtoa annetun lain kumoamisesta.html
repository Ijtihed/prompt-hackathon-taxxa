<h1>Laki oikeudesta harjoittaa valuutanvaihtoa annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan oikeudesta harjoittaa valuutanvaihtoa 29 päivänä joulukuuta 1972 annettu laki (909/72).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1991.</p>
