<h1>Laki paineastialain 8 §:n 2-4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 2 päivänä helmikuuta 1973 annetun paineastialain (98/73) 8 §:n 2-4 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä  tammikuuta 1989.</p>
