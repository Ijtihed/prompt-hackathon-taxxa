<h1>Laki lapsilisälain 16 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan lapsilisälain (796/1992) 16 a §, sellaisena kuin se on laissa 694/2002.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2024.</p>
