<h1>Laki eläkkeensaajan asumistuesta annetun lain 48 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan eläkkeensaajan asumistuesta annetun lain (571/2007) 48 §, sellaisena kuin se on osaksi laissa 1154/2007.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2024.</p>
