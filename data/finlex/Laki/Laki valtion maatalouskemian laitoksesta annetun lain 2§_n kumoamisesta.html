<h1>Laki valtion maatalouskemian laitoksesta annetun lain 2§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan valtion maatalouskemian laitoksesta 10 päivänä elokuuta 1979 annetun lain (652/79) 2§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 1988.</p>
