<h1>Laki vuoden 1886 metsälain eräiden säännösten kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 3 päivänä syyskuuta 1886 annetun metsälain (29/1886) 19 ja 51 §, 52 §:n 2 momentti ja 53 §:n 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammi- kuuta 1999.</p>
