<h1>Laki työtapaturma- ja ammattitautilain 272 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan työtapaturma- ja ammattitautilain (459/2015) 272 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 2022.</p>
