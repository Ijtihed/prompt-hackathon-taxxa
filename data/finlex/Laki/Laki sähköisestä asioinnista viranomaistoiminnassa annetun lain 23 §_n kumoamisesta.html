<h1>Laki sähköisestä asioinnista viranomaistoiminnassa annetun lain 23 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sähköisestä asioinnista viranomaistoiminnassa annetun lain (13/2003) 23 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025.</p>
