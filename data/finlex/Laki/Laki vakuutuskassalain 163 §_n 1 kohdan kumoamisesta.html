<h1>Laki vakuutuskassalain 163 §:n 1 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 27 päivänä marraskuuta 1992 annetun vakuutuskassalain (1164/1992) 163 §:n 1 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1999.</p>
