<h1>Laki palstatilain muuttamisesta itsenäisiksi tiloiksi annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan palstatilain muuttamisesta itsenäisiksi tiloiksi annettu laki (340/1926).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 2018.</p>
