<h1>Laki sosiaalihuoltolain 60 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sosiaalihuoltolain (1301/2014) 60 §, sellaisena kuin se on laissa 589/2022.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 27 päivänä maaliskuuta 2023.</p>
