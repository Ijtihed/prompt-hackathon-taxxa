<h1>Laki erikoissairaanhoitolain 28 ja 29 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan erikoissairaanhoitolain (1062/1989) 28 ja 29 §, sellaisina kuin ne ovat osaksi laissa 582/2022.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2023. </p>
