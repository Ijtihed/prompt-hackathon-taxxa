<h1>Laki metsähallinnosta annetun lain 4§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan metsähallinnosta 13 päivänä helmikuuta 1987 annetun lain (138/87) 4§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 1988.</p>
