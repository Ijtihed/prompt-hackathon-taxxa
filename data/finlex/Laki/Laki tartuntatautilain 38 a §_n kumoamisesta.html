<h1>Laki tartuntatautilain 38 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tartuntatautilain (583/1986) 38 a §, sellaisena kuin se on laissa 1259/2005.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
