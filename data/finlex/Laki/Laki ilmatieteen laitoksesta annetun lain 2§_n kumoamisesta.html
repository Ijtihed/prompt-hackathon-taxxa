<h1>Laki ilmatieteen laitoksesta annetun lain 2§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ilmatieteen laitoksesta 22 päivänä joulukuuta 1967 annetun lain (585/67) 2§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
