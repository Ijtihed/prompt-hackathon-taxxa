<h1>Laki arvonlisäverolain 209 t §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan arvonlisäverolain (1501/1993) 209 t §:n 2 momentti sellaisena kuin se on laissa 773/2016.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 3 päivänä heinäkuuta 2017.</p>
