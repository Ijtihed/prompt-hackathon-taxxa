<h1>Laki terveydenhoitolain 4 luvun kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 27 päivänä elokuuta 1965 annetun terveydenhoitolain (469/65) 4 luku siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 1988.</p>
