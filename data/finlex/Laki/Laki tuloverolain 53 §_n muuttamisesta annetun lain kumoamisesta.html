<h1>Laki tuloverolain 53 §:n muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tuloverolain 53 §:n muuttamisesta annettu laki (545/2007).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2012.</p>
