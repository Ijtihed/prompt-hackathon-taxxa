<h1>Laki vakuutusyhtiölain 13 luvun 3 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 18 päivänä heinäkuuta 2008 annetun vakuutusyhtiölain (521/2008) 13 luvun 3 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä marraskuuta 2010.</p>
