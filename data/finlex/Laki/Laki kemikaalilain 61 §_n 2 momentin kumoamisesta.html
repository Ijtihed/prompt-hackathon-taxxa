<h1>Laki kemikaalilain 61 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 14 päivänä elokuuta 1989 annetun kemikaalilain (744/1989) 61 §:n 2 momentti, sellaisena kuin se on laissa 757/1992.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1999.</p>
