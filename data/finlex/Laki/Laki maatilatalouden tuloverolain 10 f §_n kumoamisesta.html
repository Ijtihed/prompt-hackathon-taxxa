<h1>Laki maatilatalouden tuloverolain 10 f §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan maatilatalouden tuloverolain (543/1967) 10 f §, sellaisena kuin se on laeissa 1259/2013, 457/2015 ja 420/2023.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025.</p>
