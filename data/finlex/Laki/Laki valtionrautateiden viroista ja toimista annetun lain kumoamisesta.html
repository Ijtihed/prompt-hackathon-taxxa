<h1>Laki valtionrautateiden viroista ja toimista annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 26 päivänä toukokuuta 1978 annettu laki valtionrautateiden viroista ja toimista (394/78).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
