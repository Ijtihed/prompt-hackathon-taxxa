<h1>Laki ulkomaalaislain muuttamisesta annetun lain 60 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ulkomaalaislain muuttamisesta annetun lain (886/2011) 60 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 2012.</p>
