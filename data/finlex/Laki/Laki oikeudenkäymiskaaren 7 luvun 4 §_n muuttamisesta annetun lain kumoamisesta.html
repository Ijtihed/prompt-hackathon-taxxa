<h1>Laki oikeudenkäymiskaaren 7 luvun 4 §:n muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan oikeudenkäymiskaaren 7 luvun 4 §:n muuttamisesta annettu laki (24/2016).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 15 päivänä elokuuta 2018.</p>
