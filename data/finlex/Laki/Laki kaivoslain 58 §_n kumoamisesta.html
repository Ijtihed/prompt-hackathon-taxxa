<h1>Laki kaivoslain 58 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 17 päivänä syyskuuta 1965 annetun kaivoslain (503/65) 58 §. </p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan asetuksella säädettävänä päivänä. </p>
