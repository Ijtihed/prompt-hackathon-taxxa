<h1>Laki sijoitusrahastolain 8 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 8 päivänä toukokuuta 1987 annetun sijoitusrahastolain (480/87) 8 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1993.</p>
