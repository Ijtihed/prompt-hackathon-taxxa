<h1>Laki  maakaasumarkkinalain 34 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan maakaasumarkkinalain (587/2017) 34 a §, sellaisena kuin se on laeissa 288/2018 ja 327/2020.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 8 päivänä huhtikuuta 2025.</p>
