<h1>Laki perusopetuslain 34 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan perusopetuslain (628/1998) 34 a §, sellaisena kuin se on laissa 508/2003.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
