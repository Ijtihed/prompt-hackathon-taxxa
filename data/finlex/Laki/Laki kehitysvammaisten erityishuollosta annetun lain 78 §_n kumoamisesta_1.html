<h1>Laki kehitysvammaisten erityishuollosta annetun lain 78 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kehitysvammaisten erityishuollosta 23 päivänä kesäkuuta 1977 annetun lain (519/1977) 78 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2001.</p>
