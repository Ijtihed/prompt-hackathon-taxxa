<h1>Laki jäkälän maastaviennistä annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan jäkälän maastaviennistä 4 päivänä kesäkuuta 1931 annettu laki (203/31) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1995.</p>
