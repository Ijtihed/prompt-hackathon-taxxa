<h1>Laki kotimaisten kielten tutkimuskeskuksesta annetun lain 3§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan kotimaisten kielten tutkimuskeskuksesta 16 päivänä tammikuuta 1976 annetun lain (48/76) 3§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
