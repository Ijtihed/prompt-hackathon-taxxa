<h1>Laki maa-aineslain 4 c §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan maa-aineslain (555/1981) 4 c §, sellaisena kuin se on laissa 769/2019.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2026.</p>
