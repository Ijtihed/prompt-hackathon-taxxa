<h1>Laki valtion virkamieslain 35 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan valtion virkamieslain (750/1994) 35 §:n 2 momentti, sellaisena kuin se on laissa 682/2004.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä helmikuuta 2013.</p>
