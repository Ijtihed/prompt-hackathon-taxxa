<h1>Laki työturvallisuuslain 51 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 23 päivänä elokuuta 2002 annetun työturvallisuuslain (738/2002) 51 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä helmikuuta 2006.</p>
