<h1>Laki tullilain 12 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 29 päivänä joulukuuta 1994 annetun tullilain (1466/1994) 12 §, sellaisena kuin se on osaksi laissa 331/1996.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 2008.</p>
