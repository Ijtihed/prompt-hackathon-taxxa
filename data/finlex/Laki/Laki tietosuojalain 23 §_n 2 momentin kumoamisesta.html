<h1>Laki tietosuojalain 23 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tietosuojalain (1050/2018) 23 §:n 2 momentti. </p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 2023.</p>
