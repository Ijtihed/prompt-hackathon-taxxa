<h1>Laki ammatinvalinnanohjauksesta annetun lain 3§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan ammatinvalinnanohjauksesta 22 päivänä tammikuuta 1960 annetun lain (43/60) 3§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä kesäkuuta 1989.</p>
