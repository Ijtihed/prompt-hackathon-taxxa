<h1>Laki  sosiaalihuoltolain 10 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sosiaalihuoltolain (710/1982) 10 §, sellaisena kuin se on laeissa 736/1992, 813/2000 ja 938/2005.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 2016.</p>
