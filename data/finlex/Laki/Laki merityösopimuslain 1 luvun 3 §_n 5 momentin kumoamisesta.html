<h1>Laki merityösopimuslain 1 luvun 3 §:n 5 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan merityösopimuslain (756/2011) 1 luvun 3 §:n 5 momentti, sellaisena kuin se on laissa 1449/2016.</p>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2018.</p>
