<h1>Laki sosiaalihuoltolain 59 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sosiaalihuoltolain (710/1982) 59 §, sellaisena kuin se on laissa 923/2011.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
