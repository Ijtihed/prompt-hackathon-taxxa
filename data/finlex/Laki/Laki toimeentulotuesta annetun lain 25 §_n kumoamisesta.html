<h1>Laki toimeentulotuesta annetun lain 25 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan toimeentulotuesta 30 päivänä joulukuuta 1997 annetun lain (1412/1997) 25 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2001.</p>
