<h1>Laki vetorahan määrän muuttamisesta.</h1>
<p>Eduskunnan päätökset mukaisesti säädetään täten, muuttaen oikeudenkäymiskaaren 25 luvun 1 ja 15 §:ää:</p>
<p>Vetorahan määrä on oleva viisikymmentä markkaa.</p>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 1926.</p>
<p>Tätä kaikki asianomaiset noudattakoot.</p>
