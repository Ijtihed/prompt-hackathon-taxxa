<h1>Laki siviilipalveluslain 60 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 30 päivänä joulukuuta 1991 annetun siviilipalveluslain (1723/91) 60 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1993.</p>
