<h1>Asetus ulkomaalaislain muuttamisesta annetun lain voimaantulosta</h1>
<p>Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Ulkomaalaislain muuttamisesta 31 päivänä lokakuuta 1997 annettu laki (1183/1997) tulee voimaan 1 päivänä tammikuuta 1998.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1998.</p>
