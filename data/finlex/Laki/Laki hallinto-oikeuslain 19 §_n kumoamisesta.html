<h1>Laki hallinto-oikeuslain 19 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 26 päivänä maaliskuuta 1999 annetun hallinto-oikeuslain (430/1999) 19 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä syyskuuta 2001.</p>
