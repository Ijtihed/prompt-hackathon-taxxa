<h1>Laki eläintautilain 11 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 18 päivänä tammikuuta 1980 annetun eläintautilain (55/1980) 11 § sellaisena kuin se on laissa 809/1992.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 1998.</p>
