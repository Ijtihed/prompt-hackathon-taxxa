<h1>Laki ilmailuhallinnosta annetun lain 3 ja 4§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ilmailuhallinnosta 14 päivänä tammikuuta 1972 annetun lain (40/72) 3 ja 4§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä helmikuuta 1988.</p>
