<h1>Laki ulkoasiainhallinnosta annetun lain 6 ja 8 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 23 päivänä joulukuuta 1987 ulkoasiainhallinnosta annetun lain (1164/1987) 6 ja 8 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 1999.</p>
