<h1>Laki puolustusvoimista annetun lain 16 §:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan puolustusvoimista annetun lain (551/2007) 16 §:n 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
