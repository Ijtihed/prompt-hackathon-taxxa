<h1>Laki tieliikennelain muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tieliikennelain muuttamisesta annettu laki (132/2019).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä marraskuuta 2019.</p>
