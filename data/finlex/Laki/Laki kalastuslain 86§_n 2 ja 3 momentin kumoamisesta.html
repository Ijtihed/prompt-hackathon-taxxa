<h1>Laki kalastuslain 86§:n 2 ja 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 16 päivänä huhtikuuta 1982 annetun kalastuslain (286/82) 86§:n 2 ja 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 1988.</p>
