<h1>Laki maksamismääräyslain 17 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 16 päivänä heinäkuuta 1954 annetun maksamismääräyslain (319/54) 17§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 1987.</p>
