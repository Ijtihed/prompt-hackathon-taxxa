<h1>Laki työttömyysturvalain 7 luvun 3 §:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan työttömyysturvalain (1290/2002) 7 luvun 3 §:n 3 momentti, sellaisena kuin se on laissa 1049/2013.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
