<h1>Laki Suomen rahapajasta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan Suomen rahapajasta 19 päivänä joulukuuta 1980 annettu laki (877/80).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1993.</p>
