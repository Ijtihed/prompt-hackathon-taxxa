<h1>Laki aikuiskoulutustuesta annetun lain 11 §:n 13 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan aikuiskoulutustuesta annetun lain (1276/2000) 11 §:n 13 kohta, sellaisena kuin se on laissa 127/2010.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2013.</p>
