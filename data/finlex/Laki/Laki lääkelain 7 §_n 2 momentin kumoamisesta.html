<h1>Laki lääkelain 7 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan lääkelain (395/1987) 7 §:n 2 momentti, sellaisena kuin se on laissa 773/2009.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 2018.</p>
