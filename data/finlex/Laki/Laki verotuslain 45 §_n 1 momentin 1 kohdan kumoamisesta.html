<h1>Laki verotuslain 45 §:n 1 momentin 1 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 12 päivänä joulukuuta 1958 annetun verotuslain (482/58) 45 §:n 1 momentin 1 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä marraskuuta 1993.</p>
