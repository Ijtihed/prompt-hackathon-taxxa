<h1>Laki säätiön valvontamaksusta annetun lain 1 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan säätiön valvontamaksusta annetun lain (1048/2013) 1 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 2015.</p>
