<h1>Laki yritystuesta annetun lain 21 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan yritystuesta 10 päivänä joulukuuta 1993 annetun lain (1136/1993) 21 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1998.</p>
