<h1>Laki rikoslain muuttamisesta annetun lain 25 luvun 9 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan rikoslain muuttamisesta annetun lain (641/2021) 25 luvun 9 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 2022.</p>
