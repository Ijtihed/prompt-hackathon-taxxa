<h1>Laki rikoslain 2 luvun 17 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 19 päivänä joulukuuta 1889 annetun rikoslain (39/1889) 2 luvun 17 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2004.</p>
