<h1>Laki valtion perhe-eläkelain 14§:n 1 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 31 päivänä joulukuuta 1968 annetun valtion perhe-eläkelain (774/68) 14§:n 1 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1990.</p>
