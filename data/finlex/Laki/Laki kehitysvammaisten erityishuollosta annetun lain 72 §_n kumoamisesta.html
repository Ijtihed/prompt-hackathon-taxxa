<h1>Laki kehitysvammaisten erityishuollosta annetun lain 72 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan kehitysvammaisten erityishuollosta 23 päivänäkesäkuuta 1977 annetun lain (519/77) 72 §.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 1979.</p>
