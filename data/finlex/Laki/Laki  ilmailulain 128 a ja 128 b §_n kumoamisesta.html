<h1>Laki  ilmailulain 128 a ja 128 b §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ilmailulain (864/2014) 128 a ja 128 b §, sellaisina kuin ne ovat laissa 965/2018.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 8 päivänä huhtikuuta 2025.</p>
