<h1>Laki työvoimapalveluiden järjestämisestä annetun lain 12 luvun kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan työvoimapalveluiden järjestämisestä annetun lain (380/2023) 12 luku.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 2 päivänä syyskuuta 2024.</p>
