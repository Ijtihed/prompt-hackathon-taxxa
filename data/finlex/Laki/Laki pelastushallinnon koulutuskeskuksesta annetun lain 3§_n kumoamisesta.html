<h1>Laki pelastushallinnon koulutuskeskuksesta annetun lain 3§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan pelastushallinnon koulutuskeskuksesta 24 päivänä marraskuuta 1978 annetun lain (882/78) 3§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
