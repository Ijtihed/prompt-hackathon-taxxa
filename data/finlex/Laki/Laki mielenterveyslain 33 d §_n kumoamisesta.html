<h1>Laki mielenterveyslain 33 d §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan mielenterveyslain (1116/1990) 33 d §, sellaisena kuin se on laissa 1257/2005.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
