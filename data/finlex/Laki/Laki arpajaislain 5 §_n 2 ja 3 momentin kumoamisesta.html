<h1>Laki arpajaislain 5 §:n 2 ja 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 23 päivänä marraskuuta 2001 annetun arpajaislain (1047/2001) 5 §:n 2 ja 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2002.</p>
