<h1>Laki Liikenne- ja viestintävirastosta annetun lain 6 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Liikenne- ja viestintävirastosta annetun lain (935/2018) 6 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2026.</p>
