<h1>Laki kokoontumislain 12 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 22 päivänä huhtikuuta 1999 annetun kokoontumislain (530/1999) 12 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä marraskuuta 2002.</p>
