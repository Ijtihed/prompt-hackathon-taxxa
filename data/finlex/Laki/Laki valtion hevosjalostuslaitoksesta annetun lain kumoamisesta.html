<h1>Laki valtion hevosjalostuslaitoksesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan valtion hevosjalostuslaitoksesta 10 päivänä elokuuta 1979 annettu laki (651/79).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1989.</p>
