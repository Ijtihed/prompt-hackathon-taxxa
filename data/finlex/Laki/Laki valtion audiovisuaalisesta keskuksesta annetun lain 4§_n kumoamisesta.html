<h1>Laki valtion audiovisuaalisesta keskuksesta annetun lain 4§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan valtion audiovisuaalisesta keskuksesta 16 päivänä tammikuuta 1976 annetun lain (27/76) 4§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
