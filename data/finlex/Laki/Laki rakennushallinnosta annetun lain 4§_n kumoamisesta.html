<h1>Laki rakennushallinnosta annetun lain 4§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan rakennushallinnosta 30 päivänä joulukuuta 1981 annetun lain (1045/81) 4§.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
