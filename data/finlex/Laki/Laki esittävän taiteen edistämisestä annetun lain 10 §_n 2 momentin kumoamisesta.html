<h1>Laki esittävän taiteen edistämisestä annetun lain 10 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan esittävän taiteen edistämisestä annetun lain (1082/2020) 10 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2024.</p>
