<h1>Laki kuntajaosta annetun lain 36 ja 37 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan kuntajaosta 21 päivänä tammikuuta 1977 annetun lain (73/77) 36 ja37 §.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1983.</p>
