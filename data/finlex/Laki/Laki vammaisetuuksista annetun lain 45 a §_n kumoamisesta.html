<h1>Laki vammaisetuuksista annetun lain 45 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan vammaisetuuksista annetun lain (570/2007) 45 a §, sellaisena kuin se on laissa 1331/2011.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2024.</p>
