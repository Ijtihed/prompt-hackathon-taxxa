<h1>Laki henkilörekisterilain 7§:n 5 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 30 päivänä huhtikuuta 1987 annetun henkilörekisterilain (471/87) 7§:n 5 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä &gt;tammikuuta 1990.</p>
