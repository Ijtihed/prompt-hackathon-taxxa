<h1>Laki näkövammaisten kirjastosta annetun lain 5 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan näkövammaisten kirjastosta annetun lain (638/1996) 5 a §, sellaisena kuin se on laissa 1053/2001.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2017.</p>
