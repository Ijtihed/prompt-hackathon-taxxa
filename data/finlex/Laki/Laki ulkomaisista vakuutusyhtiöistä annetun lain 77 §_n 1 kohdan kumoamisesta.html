<h1>Laki ulkomaisista vakuutusyhtiöistä annetun lain 77 §:n 1 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan ulkomaisista vakuutusyhtiöistä 17 päivänä maaliskuuta 1995 annetun lain (398/1995) 77 §:n 1 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1999.</p>
