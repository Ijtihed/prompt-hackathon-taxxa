<h1>Laki äitiysavustuslain 14 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan äitiysavustuslain (477/1993) 14 a §, sellaisena kuin se on laissa 695/2002.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2024.</p>
