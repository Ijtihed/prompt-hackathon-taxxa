<h1>Laki maatalouden tutkimuskeskuksesta annetun lain 2§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan maatalouden tutkimuskeskuksesta 22 päivänä joulukuuta 1983 annetun lain (1067/83) 2§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 1988.</p>
