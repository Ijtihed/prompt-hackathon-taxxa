<h1>Laki luottoverolain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 19 päivänä tammikuuta 1990 annettu luottoverolaki (48/90) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1996.</p>
