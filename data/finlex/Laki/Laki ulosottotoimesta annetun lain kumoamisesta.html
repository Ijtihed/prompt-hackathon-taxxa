<h1>Laki ulosottotoimesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan ulosottotoimesta 14 päivänä joulukuuta 1984 annettu laki (866/84) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 1996.</p>
