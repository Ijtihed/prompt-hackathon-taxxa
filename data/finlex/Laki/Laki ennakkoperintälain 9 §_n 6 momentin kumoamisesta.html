<h1>Laki ennakkoperintälain 9 §:n 6 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ennakkoperintälain (1118/1996) 9 §:n 6 momentti, sellaisena kuin se on laissa 791/2012.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2014.</p>
