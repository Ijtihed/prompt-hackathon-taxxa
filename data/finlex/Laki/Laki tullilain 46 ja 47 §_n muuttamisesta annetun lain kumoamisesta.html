<h1>Laki tullilain 46 ja 47 §:n muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tullilain 46 ja 47 §:n muuttamisesta annettu laki (763/2010).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä kesäkuuta 2015.</p>
