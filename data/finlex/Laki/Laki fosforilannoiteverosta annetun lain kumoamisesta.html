<h1>Laki fosforilannoiteverosta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan fosforilannoiteverosta 14 päivänä joulukuuta 1990 annettu laki (1084/90).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1992.</p>
