<h1>Laki Mediakasvatus- ja kuvaohjelmakeskuksesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Mediakasvatus- ja kuvaohjelmakeskuksesta annettu laki (711/2011).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2014.</p>
