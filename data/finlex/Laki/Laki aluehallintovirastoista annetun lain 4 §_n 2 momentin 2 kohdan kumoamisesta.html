<h1>Laki aluehallintovirastoista annetun lain 4 §:n 2 momentin 2 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan aluehallintovirastoista annetun lain (896/2009) 4 §:n 2 momentin 2 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2020.</p>
