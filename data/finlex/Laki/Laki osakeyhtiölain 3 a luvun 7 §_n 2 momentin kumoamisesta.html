<h1>Laki osakeyhtiölain 3 a luvun 7 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 29 päivänä syyskuuta 1978 annetun osakeyhtiölain (734/1978) 3 a luvun 7 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä kesäkuuta 1998.</p>
