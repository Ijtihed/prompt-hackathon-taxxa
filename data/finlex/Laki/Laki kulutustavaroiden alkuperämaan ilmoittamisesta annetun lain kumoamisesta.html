<h1>Laki kulutustavaroiden alkuperämaan ilmoittamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan kulutustavaroiden alkuperämaan ilmoittamisesta 25 päivänä helmikuuta 1983 annettu laki (227/83).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä marraskuuta 1992.</p>
