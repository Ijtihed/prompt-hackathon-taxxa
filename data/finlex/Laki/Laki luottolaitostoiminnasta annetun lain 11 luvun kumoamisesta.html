<h1>Laki luottolaitostoiminnasta annetun lain 11 luvun kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan luottolaitostoiminnasta 30 päivänä joulukuuta 1993 annetun lain (1607/1993) 11 luku.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä lokakuuta 1998.</p>
