<h1>Laki puolustusvoimista annetun lain 50 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan puolustusvoimista annetun lain (551/2007) 50 §:n 4 momentti, sellaisena kuin se on laissa 678/2008.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025. </p>
