<h1>Laki Maanpuolustuskorkeakoulusta annetun lain 24 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Maanpuolustuskorkeakoulusta annetun lain (1121/2008) 24 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 2014.</p>
