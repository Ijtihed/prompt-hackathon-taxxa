<h1>Laki nuorista rikoksentekijöistä annetun lain eräiden säännösten kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan nuorista rikoksentekijöistä 31 päivänä toukokuuta 1940 annetun lain (262/40) 2-5§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1991.</p>
