<h1>Laki säästöpankkilain 128 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 28 päivänä joulukuuta 2001 annetun säästöpankkilain (1502/2001) 128 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2010.</p>
