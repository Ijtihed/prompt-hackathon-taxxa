<h1>Laki oikeudenkäymiskaaren 10 luvun 21 §:n 2 ja 3 momentin kumoamisesta.</h1>
<p>Eduskunnan päätöksen mukaisesti kumotaan oikeudenkäymiskaaren 10 luvun 21 §:n 2 ja 3 momenttti, sellaisina kuin ne ovat 14 päivänä elokuuta 1901 annetussa asetuksessa (33/01).</p>
