<h1>Laki merimiesten vuosilomalain 28 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 1 päivänä kesäkuuta 1984 annetun merimiesten vuosilomalain (433/1984) 28 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan asetuksella säädettävänä ajankohtana.</p>
