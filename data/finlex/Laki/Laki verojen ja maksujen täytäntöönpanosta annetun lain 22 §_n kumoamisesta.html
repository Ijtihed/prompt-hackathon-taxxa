<h1>Laki verojen ja maksujen täytäntöönpanosta annetun lain 22 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan verojen ja maksujen täytäntöönpanosta annetun lain (706/2007) 22 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025.</p>
