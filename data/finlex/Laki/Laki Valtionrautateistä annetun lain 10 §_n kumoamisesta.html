<h1>Laki Valtionrautateistä annetun lain 10 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Valtionrautateistä 14 päivänä elokuuta 1989 annetun lain (747/89) 10 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 1994.</p>
