<h1>Laki sotilasavustuslain 22 d §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sotilasavustuslain (781/1993) 22 d §, sellaisena kuin se on laissa 690/2002.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2024.</p>
