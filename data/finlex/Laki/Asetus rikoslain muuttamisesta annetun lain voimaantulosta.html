<h1>Asetus rikoslain muuttamisesta annetun lain voimaantulosta</h1>
<p>Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Rikoslain muuttamisesta 14 päivänä maaliskuuta 1997 annettu laki (351/1997) tulee voimaan 29 päivänä huhtikuuta 1997.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 29 päivänä huhtikuuta 1997.</p>
