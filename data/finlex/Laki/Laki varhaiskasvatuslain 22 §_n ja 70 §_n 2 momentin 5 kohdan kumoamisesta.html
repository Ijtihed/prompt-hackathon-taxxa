<h1>Laki varhaiskasvatuslain 22 §:n ja 70 §:n 2 momentin 5 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan varhaiskasvatuslain (540/2018) 22 § ja 70 §:n 2 momentin 5 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025.</p>
