<h1>Laki osakeyhtiölain 5 luvun 1 §:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 29 päivänä syyskuuta 1978 annetun osakeyhtiölain (734/78) 5 luvun 1 §:n 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan asetuksella säädettävänä ajankohtana.</p>
