<h1>Laki Taiteen edistämiskeskuksesta annetun lain 11 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Taiteen edistämiskeskuksesta annetun lain (657/2012) 11 §, sellaisena kuin se on laissa 1300/2016.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2024.</p>
