<h1>Laki ulkoilulain 22 §:n 1 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ulkoilulain (606/1973) 22 §:n 1 momentti, sellaisena kuin se on laissa 534/1999.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2017.</p>
