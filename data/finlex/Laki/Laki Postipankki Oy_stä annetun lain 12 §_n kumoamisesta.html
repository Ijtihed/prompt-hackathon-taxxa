<h1>Laki Postipankki Oy:stä annetun lain 12 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 11 päivänä joulukuuta 1987 Postipankki Oy:stä annetun lain (972/87) 12 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 1996.</p>
