<h1>Laki vakuutusyhdistyslain 16 luvun 8 §:n 1 ja 2 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 31 päivänä joulukuuta 1987 annetun vakuutusyhdistyslain (1250/ 1987) 16 luvun 8 §:n 1 ja 2 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1999.</p>
