<h1>Laki energiatehokkuuslain 25 §:n 5 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan energiatehokkuuslain (1429/2014) 25 §:n 5 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2021.</p>
