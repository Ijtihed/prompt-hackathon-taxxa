<h1>Laki eläkesäätiölain 130 §:n 1 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 29 päivänä joulukuuta 1995 annetun eläkesäätiölain (1774/1995) 130 §:n 1 kohta.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1999.</p>
