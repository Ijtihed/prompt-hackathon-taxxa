<h1>Laki Eduskunnan kirjastosta annetun lain 9 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan Eduskunnan kirjastosta 28 päivänä joulukuuta 1984 annetun lain (983/84) 9 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1993.</p>
