<h1>Laki merityöaikalain 16 c §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 9 päivänä huhtikuuta 1976 annetun merityöaikalain (296/1976) 16 c §, sellaisena kuin se on laissa 435/1984.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan asetuksella säädettävänä ajankohtana.</p>
