<h1>Laki työllisyyskoulutuksesta annetun lain 4§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan työllisyyskoulutuksesta 16 päivänä tammikuuta 1976 annetun lain (31/76) 4§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä kesäkuuta 1989.</p>
