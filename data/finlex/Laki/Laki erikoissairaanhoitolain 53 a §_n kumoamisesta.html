<h1>Laki erikoissairaanhoitolain 53 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan erikoissairaanhoitolain (1062/1989) 53 a §, sellaisena kuin se on laissa 1256/2005.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
