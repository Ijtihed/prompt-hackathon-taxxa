<h1>Laki geologian tutkimuskeskuksesta annetun lain 3§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan geologian tutkimuskeskuksesta 16 päivänä joulukuuta 1983 annetun lain (995/83) 3§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
