<h1>Laki verohallituksesta annetun lain 3§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan verohallituksesta 5 päivänä joulukuuta 1969 annetun lain (739/69) 3§.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
