<h1>Laki yksityisistä sosiaalipalveluista annetun lain 38 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan yksityisistä sosiaalipalveluista annetun lain (922/2011) 38 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
