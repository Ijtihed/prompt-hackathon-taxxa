<h1>Laki rikoslain 45 luvun 26 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 19 päivänä joulukuuta 1889 annetun rikoslain (39/1889) 45 luvun 26 a §, sellaisena kuin se on laeissa 515/2003 ja 776/2005.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2008.</p>
