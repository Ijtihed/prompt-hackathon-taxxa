<h1>Laki hätäkeskustoiminnasta annetun lain 16 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan hätäkeskustoiminnasta annetun lain (692/2010) 16 §:n 4 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2020.</p>
