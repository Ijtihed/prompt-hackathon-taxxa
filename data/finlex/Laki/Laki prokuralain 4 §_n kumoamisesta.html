<h1>Laki prokuralain 4 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 2 päivänä helmikuuta 1979 annetun prokuralain (130/1979) 4 §, sellaisena kuin se on laissa 96/1993.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2003.</p>
