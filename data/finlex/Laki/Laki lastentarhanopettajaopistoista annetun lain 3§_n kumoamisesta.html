<h1>Laki lastentarhanopettajaopistoista annetun lain 3§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan lastentarhanopettajaopistoista 21 päivänä tammikuuta 1977 annetun lain (80/77) 3§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
