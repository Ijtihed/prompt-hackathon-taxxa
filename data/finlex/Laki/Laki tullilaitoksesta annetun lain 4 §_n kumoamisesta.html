<h1>Laki tullilaitoksesta annetun lain 4 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tullilaitoksesta 8 päivänä helmikuuta 1991 annetun lain (228/1991) 4 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1998.</p>
