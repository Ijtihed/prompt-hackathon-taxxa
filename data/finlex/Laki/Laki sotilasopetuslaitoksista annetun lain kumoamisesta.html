<h1>Laki sotilasopetuslaitoksista annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sotilasopetuslaitoksista 21 päivänä tammikuuta 1966 annettu laki (15/66) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1993.</p>
