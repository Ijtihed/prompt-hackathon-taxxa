<h1>Laki kansanterveyslain 40 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan 28 päivänä tammikuuta 1972 annetunkansanterveyslain 40 §, sellaisena kuin se on 27 päivänä elokuuta1976 annetussa laissa (737/76).</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 1979.</p>
