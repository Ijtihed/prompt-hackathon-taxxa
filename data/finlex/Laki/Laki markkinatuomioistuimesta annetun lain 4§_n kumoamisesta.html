<h1>Laki markkinatuomioistuimesta annetun lain 4§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan markkinatuomioistuimesta 20 päivänä tammikuuta 1978 annetun lain (41/78) 4§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 15 päivänä joulukuuta 1988.</p>
