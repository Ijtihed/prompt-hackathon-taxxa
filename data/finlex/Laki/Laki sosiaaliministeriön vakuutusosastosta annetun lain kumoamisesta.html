<h1>Laki sosiaaliministeriön vakuutusosastosta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan sosiaaliministeriön vakuutusosastosta 30 päivänä joulukuuta 1952 annettu laki (451/52).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
