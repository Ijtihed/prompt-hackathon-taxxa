<h1>Laki Ilmailulaitoksesta annetun lain 10 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Ilmailulaitoksesta 14 päivänä joulukuuta 1990 annetun lain (1123/ 90) 10 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 1994.</p>
