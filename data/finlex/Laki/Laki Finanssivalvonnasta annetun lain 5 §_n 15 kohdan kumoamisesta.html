<h1>Laki Finanssivalvonnasta annetun lain 5 §:n 15 kohdan kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Finanssivalvonnasta annetun lain (878/2008) 5 §:n 15 kohta, sellaisena kuin se on laissa 752/2012.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2025.</p>
