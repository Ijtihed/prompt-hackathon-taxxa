<h1>Laki tie- ja katuverkon tietojärjestelmästä annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>
                                Tällä lailla kumotaan tie- ja katuverkon tietojärjestelmästä annettu laki 
                                <a href="https://www.finlex.fi/akn/fi/act/statute-consolidated/2003/991" rel="noopener noreferrer" target="_blank">(991/2003)</a>.
                            </p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2026.</p>
