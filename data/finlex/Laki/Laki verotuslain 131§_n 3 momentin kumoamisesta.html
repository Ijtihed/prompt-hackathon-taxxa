<h1>Laki verotuslain 131§:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 12 päivänä joulukuuta 1958 annetun verotuslain (482/58) 131§:n 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä elokuuta 1990.</p>
