<h1>Laki kauppalain 58 §:n 2 momentin ja 63 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaan säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 27 päivänä maaliskuuta 1987 annetun kauppalain (355/87) 58 §:n 2 momentti ja 63 §:n 4 momentti.</p>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 1994.</p>
