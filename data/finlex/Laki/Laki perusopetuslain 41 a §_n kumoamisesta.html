<h1>Laki perusopetuslain 41 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan perusopetuslain (628/1998) 41 a §, sellaisena kun se on laissa 1288/2013.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2022</p>
