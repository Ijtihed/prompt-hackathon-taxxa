<h1>Laki omistusasuntolainojen korkotuesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>
                                Tällä lailla kumotaan omistusasuntolainojen korkotuesta annettu laki 
                                <a href="https://www.finlex.fi/akn/fi/act/statute-consolidated/1993/1204" rel="noopener noreferrer" target="_blank">(1204/1993)</a>.
                            </p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2026.</p>
