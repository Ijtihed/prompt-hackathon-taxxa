<h1>Laki rekisterihallintolain 3 §:n 3 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 15 päivänä maaliskuuta 1996 annetun rekisterihallintolain (166/1996) 3 §:n 3 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä lokakuuta 1999.</p>
