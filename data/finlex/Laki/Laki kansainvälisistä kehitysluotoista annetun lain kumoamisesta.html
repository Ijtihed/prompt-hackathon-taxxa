<h1>Laki kansainvälisistä kehitysluotoista annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan kansainvälisistä kehitysluotoista 30 päivänä joulukuuta 1969 annettu laki (925/69).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 1992.</p>
