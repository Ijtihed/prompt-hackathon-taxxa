<h1>Laki rauhan- ja konfliktintutkimuslaitoksesta annetun lain 2 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan rauhan- ja konfliktintutkimuslaitoksesta 23 päivänä tammikuuta 1970 annetun lain (45/70) 2§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
