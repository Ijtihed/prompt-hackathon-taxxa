<h1>Laki maakaaren muuttamisesta annetun lain voimaantulosäännöksen 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan maakaaren muuttamisesta annetun lain (96/2011) voimaantulosäännöksen 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä marraskuuta 2013.</p>
