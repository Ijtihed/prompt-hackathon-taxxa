<h1>Laki perintökaaren voimaanpanosta annetun lain 9 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan perintökaaren voimaanpanosta 5 päivänä helmikuuta 1965 annetun lain (41/65) 9 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä syyskuuta 1994.</p>
