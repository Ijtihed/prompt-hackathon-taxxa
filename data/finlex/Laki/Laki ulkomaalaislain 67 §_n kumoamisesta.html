<h1>Laki ulkomaalaislain 67 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 22 päivänä helmikuuta 1991 annetun ulkomaalaislain (378/1991) 67 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä kesäkuuta 1998.</p>
