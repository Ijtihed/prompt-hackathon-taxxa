<h1>Laki säätiölain muuttamisesta annetun lain 12 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1  §</h3>
<p>Täten kumotaan säätiölain muuttamisesta 13 päivänä joulukuuta 1994 annetun lain (1172/94) 12 §:n 2 momentti.</p>
<h3>2  §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1995.</p>
