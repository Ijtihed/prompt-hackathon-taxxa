<h1>Laki verotuslain 65 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan 12 päivänä joulukuuta 1958 annetun verotuslain (482/58) 65 §.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1985.</p>
