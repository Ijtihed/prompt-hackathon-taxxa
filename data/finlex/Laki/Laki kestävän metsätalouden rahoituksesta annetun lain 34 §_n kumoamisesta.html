<h1>Laki kestävän metsätalouden rahoituksesta annetun lain 34 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kestävän metsätalouden rahoituksesta annetun lain (1094/1996) 34 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2012.</p>
