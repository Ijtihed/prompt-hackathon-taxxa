<h1>Laki matkailun edistämiskeskuksesta annetun lain 4§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan matkailun edistämiskeskuksesta 23 päivänä helmikuuta 1973 annetun lain (186/73) 4§.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
