<h1>Laki teurasruhojen punnituksesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan teurasruhojen punnituksesta 9 päivänä joulukuuta 1966 annettu laki (627/66) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 1995.</p>
