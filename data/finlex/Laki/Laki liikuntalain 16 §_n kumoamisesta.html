<h1>Laki liikuntalain 16 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan liikuntalain (390/2015) 16 §, sellaisena kuin se on laissa 1301/2016.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2024.</p>
