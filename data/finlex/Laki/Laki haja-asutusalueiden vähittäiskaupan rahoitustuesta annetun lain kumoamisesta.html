<h1>Laki haja-asutusalueiden vähittäiskaupan rahoitustuesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan haja-asutusalueiden vähittäiskaupan rahoitustuesta annettu laki (1086/1974).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 2017.</p>
