<h1>Laki Metsähallituksesta annetun lain 12 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan Metsähallituksesta 17 päivänä joulukuuta 1993 annetun lain (1169/ 93) 12 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä joulukuuta 1994.</p>
