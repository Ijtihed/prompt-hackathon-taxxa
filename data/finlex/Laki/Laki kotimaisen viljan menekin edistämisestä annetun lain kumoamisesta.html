<h1>Laki kotimaisen viljan menekin edistämisestä annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kotimaisen viljan menekin edistämisestä 18 päivänä huhtikuuta 1958 annettu laki (168/58).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 10 päivänä elokuuta 1994.</p>
