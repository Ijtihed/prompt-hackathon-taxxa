<h1>Laki leipomotyölain 5 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan leipomotyölain (302/1961) 5 §, sellaisena kuin se on laissa 916/1993.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 2025.</p>
