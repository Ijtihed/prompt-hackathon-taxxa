<h1>Laki näkövammaisten kirjastosta annetun lain 5§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan näkövammaisten kirjastosta 9 päivänä tammikuuta 1978 annetun lain (11/78) 5§.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
