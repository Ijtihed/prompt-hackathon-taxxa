<h1>Laki ammattikorkeakoululain 32 §:n 2 momentin ja 34 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 9 päivänä toukokuuta 2003 annetun ammattikorkeakoululain (351/2003) 32 §:n 2 momentti ja 34 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2006.</p>
