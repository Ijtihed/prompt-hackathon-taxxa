<h1>Laki kuntien valtionosuuslain muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kuntien valtionosuuslain muuttamisesta 3 päivänä joulukuuta 2004 annettu laki (1036/2004).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 15 päivänä huhtikuuta 2008.</p>
