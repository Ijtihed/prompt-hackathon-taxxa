<h1>Laki liikevaihtoverolain 134 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 22 päivänä maaliskuuta 1991 annetun liikevaihtoverolain (559/91) 134 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1994.</p>
