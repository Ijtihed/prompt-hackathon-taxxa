<h1>Laki kansanterveyslain 45 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan kansanterveyslain (66/1972) 45 §, sellaisena kuin se on laissa 1254/2005.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2015.</p>
