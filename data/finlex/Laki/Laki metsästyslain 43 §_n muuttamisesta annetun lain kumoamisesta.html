<h1>Laki metsästyslain 43 §:n muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan metsästyslain 43 §:n muuttamisesta annettu laki (905/2014).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 15 päivänä toukokuuta 2020.</p>
