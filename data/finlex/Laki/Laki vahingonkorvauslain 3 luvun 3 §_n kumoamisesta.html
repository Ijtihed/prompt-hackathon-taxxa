<h1>Laki vahingonkorvauslain 3 luvun 3 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan 31 päivänä toukokuuta1974 annetun vahingonkorvauslain (412/74)3 luvun 3 §.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1979.</p>
