<h1>Laki tieliikenteen ajo- ja lepoajoista annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tieliikenteen ajo- ja lepoajoista 19 päivänä tammikuuta 1990 annettu laki (61/90).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan asetuksella säädettävänä ajankohtana.</p>
