<h1>Laki Valtion Korjaamon nimen muuttamisesta nimeksi RASKONE</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1  §</h3>
<p>Valtion Korjaamosta annetussa laissa (385/94) tarkoitetun Valtion Korjaamon nimi muutetaan nimeksi RASKONE.</p>
<h3>2  §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 1995.</p>
