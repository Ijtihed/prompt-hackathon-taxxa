<h1>Laki  alusliikennepalvelulain 18 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan alusliikennepalvelulain (623/2005) 18 a §, sellaisena kuin se on laissa 947/2018.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 8 päivänä huhtikuuta 2025.</p>
