<h1>Laki elintarvikevirastosta annetun lain 3 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan elintarvikevirastosta 9 päivänä helmikuuta 1990 annetun lain (111/90) 3 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä huhtikuuta 1995.</p>
