<h1>Laki Suomen rahapajasta annetun lain 5§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan Suomen rahapajasta 19 päivänä joulukuuta 1980 annetun lain (877/80) 5§.</p>
<h3>2§</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1988.</p>
