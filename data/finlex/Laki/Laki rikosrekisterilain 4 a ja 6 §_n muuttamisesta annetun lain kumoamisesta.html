<h1>Laki rikosrekisterilain 4 a ja 6 §:n muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan rikosrekisterilain 4 a ja 6 §:n muuttamisesta annettu laki (27/2012).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä heinäkuuta 2012.</p>
