<h1>Laki meripelastuslain 25 a §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan meripelastuslain (1145/2001) 25 a §, sellaisena kuin se on laissa 752/2014.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2020.</p>
