<h1>Laki lääkelain 93 a ja 93 b §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan lääkelain (395/1987) 93 a ja 93 b §, sellaisina kuin ne ovat, 93 a § laissa 1546/2009 ja 93 b § laissa 773/2009.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 25 päivänä kesäkuuta 2023.</p>
