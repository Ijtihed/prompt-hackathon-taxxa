<h1>Laki pysäköinninvalvonnasta annetun lain 21 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan pysäköinninvalvonnasta annetun lain (727/2011) 21 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä kesäkuuta 2020.</p>
