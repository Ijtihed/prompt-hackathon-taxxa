<h1>Laki tonnistoverolain muuttamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan tonnistoverolain muuttamisesta annettu laki (1249/2009).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 2012.</p>
