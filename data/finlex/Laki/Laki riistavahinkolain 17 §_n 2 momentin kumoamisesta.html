<h1>Laki riistavahinkolain 17 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan riistavahinkolain (105/2009) 17 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 2011. Sitä sovelletaan kuitenkin 1 päivästä tammikuuta 2011.</p>
