<h1>Laki ammatillisesta koulutuksesta annetun lain 110 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ammatillisesta koulutuksesta annetun lain (531/2017) 110 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2022.</p>
