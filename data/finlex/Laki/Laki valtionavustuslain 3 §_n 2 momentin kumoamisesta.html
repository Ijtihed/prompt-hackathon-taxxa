<h1>Laki valtionavustuslain 3 §:n 2 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan valtionavustuslain (688/2001) 3 §:n 2 momentti, sellaisena kuin se on laissa 1294/2016.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2023.</p>
