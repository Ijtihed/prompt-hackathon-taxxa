<h1>Laki evankelis-luterilaisen kirkon vaakunoista annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan evankelis-luterilaisen kirkon vaakunoista annettu laki (785/1986).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 2012.</p>
