<h1>Laki viljakauppalain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 28 päivänä heinäkuuta 1978 annettu viljakauppalaki (580/78).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 10 päivänä elokuuta 1994.</p>
