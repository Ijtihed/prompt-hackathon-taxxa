<h1>Laki ulkomaisista vakuutusyhtiöistä annetun lain 58 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan ulkomaisista vakuutusyhtiöistä 17 päivänä maaliskuuta 1995 annetun lain (398/1995) 58 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan asetuksella säädettävänä ajankohtana.</p>
