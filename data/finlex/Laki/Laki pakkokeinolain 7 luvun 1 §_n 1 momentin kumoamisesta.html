<h1>Laki pakkokeinolain 7 luvun 1 §:n 1 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 30 päivänä huhtikuuta 1987 annetun pakkokeinolain (450/1987) 7 luvun 1 §:n 1 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä maaliskuuta 2000.</p>
