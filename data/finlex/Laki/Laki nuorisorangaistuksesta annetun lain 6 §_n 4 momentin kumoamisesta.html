<h1>Laki nuorisorangaistuksesta annetun lain 6 §:n 4 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan nuorisorangaistuksesta 21 päivänä joulukuuta 2004 annetun lain (1196/2004) 6 §:n 4 momentti.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2006.</p>
