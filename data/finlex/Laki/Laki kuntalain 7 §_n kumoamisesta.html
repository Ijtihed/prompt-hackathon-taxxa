<h1>Laki kuntalain 7 §:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan 17 päivänä maaliskuuta 1995 annetun kuntalain (365/1995) 7 §.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä lokakuuta 2003.</p>
