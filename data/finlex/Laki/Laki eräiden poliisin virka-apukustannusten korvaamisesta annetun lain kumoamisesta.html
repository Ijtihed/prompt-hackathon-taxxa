<h1>Laki eräiden poliisin virka-apukustannusten korvaamisesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan eräiden poliisin virka-apukustannusten korvaamisesta annettu laki (259/1956).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2023.</p>
