<h1>KHO:1995-A-20</h1>
<p>Kunnallisen eläkelaitoksen eläkesäännön teknistä katkaisua koskevia määräyksiä ei sovellettu palvelukseen, jossa työansion aleneminen johtui siitä, että säännöllinen kolmivuorotyö muuttui säännölliseksi päivätyöksi työajan samalla pidentyessä.</p>
<p>Äänestys 4-3.</p>
