<h1>KHO:1982-A-II-32</h1>
<p>Viran hakuajan päättymisen jälkeen toimitettua hakemuksen peruutuksen peruutusta oli pidettävä uutena hakemuksena, jota ei voitu ottaa virkaa täytettäessä huomioon.</p>
<p>KunL 139 §
                    KunL 141 §</p>
