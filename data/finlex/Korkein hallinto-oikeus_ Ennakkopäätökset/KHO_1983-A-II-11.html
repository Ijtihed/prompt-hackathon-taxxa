<h1>KHO:1983-A-II-11</h1>
<p>Ruotsin kansalaisen pyyntöä saada jäljennökset häntä itseään koskevista asiakirjoista ei voitu evätä sillä perusteella, ettei hänellä ulkomaalaisena ollut oikeutta saada tietoa sanotuista asiakirjoista.</p>
<p>AsiakJulkL 19 §</p>
