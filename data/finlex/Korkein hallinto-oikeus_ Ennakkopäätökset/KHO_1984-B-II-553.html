<h1>KHO:1984-B-II-553</h1>
<p>Maatalousyhtymän osakkaan puolisoa, joka oli työskennellyt maatilalla, ei katsottu yhtymän osakkaaksi, kun hänellä ei ollut osuutta yhtymän varallisuuteen.</p>
<p>Äänestys 3-1.</p>
