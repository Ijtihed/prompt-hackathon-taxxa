<h1>KHO:1980-B-II-633</h1>
<p>Yhtiö muutti kaupungilta vuokraamansa varastohallin lihankäsittelyhalliksi. Ainoastaan hallin ulkoseinät käytettiin hyväksi. Työn kustannuksista ei saanut liikevaihtoverolain 18 a §:ssä tarkoitettua vähennystä.</p>
<p>LiikevaihtoveroL 18 a §</p>
