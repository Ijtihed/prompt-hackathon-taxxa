<h1>KHO:1985-A-II-69</h1>
<p>Kaupunginhallituksen päätös, joka koski sitä, miten eri kiinteistöjen arvot oli otettava huomioon kuntakohtaista katumaksuprosenttia määrättäessä oli luonteeltaan valmisteleva eikä se siis ollut valituskelpoinen.</p>
<p>KunL 139 § 3 mom
