<h1>KHO:1981-B-II-637</h1>
<p>Hakemus autoveron palautuksen saamiseksi voitiin, ottaen huomioon auto- ja moottoripyöräverosta annetun lain 17 § 1 mom (970/78) ja auto- ja moottoripyöräverosta annetun asetuksen 7 § 2 mom (95/80), tehdä ja ratkaista, vaikkei palautuksen hakija ollut vielä hankkinut autoa.</p>
