<h1>KHO:1983-A-II-86</h1>
<p>Lääninhallituksen rakennuslain 132 §:n 1 momentin mukaiseen toimivaltaan kuului myöntää poikkeus rakennusjärjestyksen määräyksestä, vaikka siinä oli rakennuslautakunnalle annettu mahdollisuus erityisistä syistä myöntää poikkeus tästä määräyksestä.</p>
