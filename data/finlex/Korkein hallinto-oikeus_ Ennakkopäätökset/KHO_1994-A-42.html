<h1>KHO:1994-A-42</h1>
<p>Tavaramerkki MUSTA MAKIA, joka tarkoitti lakritsipatukkaa, oli erottamiskykyinen. Tavaramerkki ei ilmaissut tavaran laatua tai lajia yksinomaan eikä vähäisenä muunteluna tai lisäyksenä.</p>
<p>TavarmerkkiL 13 § 1 mom</p>
