<h1>KHO:1989-A-21</h1>
<p>Kansaneläkelain mukaista lapsikorotusta ei otettu huomioon lisäeläketurvan mukaisen eläkkeen yhteensovitusperustetta valtion eläkelain 12 §:n 2 momentin mukaan määrättäessä, kun lapsikorotusta ei maksettu kansaneläkehakemuksen tultua hylätyksi.</p>
<p>VEL 12 § 2 mom
                    VEL 12 § 4 mom
                    VEL 13 §</p>
