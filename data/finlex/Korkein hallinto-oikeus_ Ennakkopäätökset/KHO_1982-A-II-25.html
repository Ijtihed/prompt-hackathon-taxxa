<h1>KHO:1982-A-II-25</h1>
<p>Kuntainliiton liittovaltuusto ei ollut liittohallituksen jäseniä ja varajäseniä valitessaan sidottu kuntainliiton alueen puolueosastojen esitykseen kyseisen puolueen edustajina liittohallitukseen valittavista henkilöistä.</p>
<p>KunL 122 § 4 mom</p>
