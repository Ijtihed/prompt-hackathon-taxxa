<h1>KHO:1987-A-52</h1>
<p>Kun rakennuslautakunnan rakennustyön loppuunsaattamiseksi asettama määräaika oli umpeenkulunut ja rakennuslupa siten rauennut, ei määräajan jälkeen saapuneeseen rakennusluvan voimassaoloajan pidentämistä koskevaan hakemukseen voitu suostua.</p>
<p>RakennusL 150 § 2 mom</p>
