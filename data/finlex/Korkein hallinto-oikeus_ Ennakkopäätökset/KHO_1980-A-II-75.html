<h1>KHO:1980-A-II-75</h1>
<p>Asuntojen järjestäminen terveyskeskuksen henkilökunnalle v. 1977 ei ollut kunnan kansanterveystyöhön kuuluva velvollisuus eikä kunnalla ollut oikeutta valtionosuuteen siitä aiheutuneista kustannuksista.</p>
<p>KansanterveysL 14 §
                    KansanterveysL 19 §
                    KansanterveysL 27 §</p>
