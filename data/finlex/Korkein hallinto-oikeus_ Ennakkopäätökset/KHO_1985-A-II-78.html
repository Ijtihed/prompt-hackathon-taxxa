<h1>KHO:1985-A-II-78</h1>
<p>Ulkomaalaiselle ulkomailla myönnetty turvapaikkaoikeus oli peruutettu sen jälkeen kun sisäasiainministeriö oli antanut karkottamista koskevan päätöksensä. Päätös kumottiin asian näin muuttuneeseen tilaan nähden ja asia palautettiin ministeriölle uudelleen käsiteltäväksi.</p>
