<h1>KHO:1983-A-II-39</h1>
<p>Kun liikuntalautakunnan kokouksessa urheiluseurojen vuosiavustuksiin varatun määrärahan jakoa käsiteltäessä oli läsnä esteellinen henkilö, oli lautakunnan päätös syntynyt virheellisessä järjestyksessä.</p>
<p>KunL 25 § 1 mom</p>
