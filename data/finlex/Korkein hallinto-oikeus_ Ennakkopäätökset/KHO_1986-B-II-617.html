<h1>KHO:1986-B-II-617</h1>
<p>Lainhuudon hakemisen tapahtuessa lainhuudatuslaissa säädetyn määräajan jälkeen lainhuudatusleimaveroa oli korotettava leimaverolain 19 §:n mukaisesti, vaikka leimavero oli suoritettu lääninkonttoriin lainhuudatusajan kuluessa.</p>
<p>Samoin D:653/30/77</p>
<p>LeimaveroL 19 §</p>
