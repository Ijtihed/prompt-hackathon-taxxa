<h1>KHO:1983-A-II-40</h1>
<p>Kaupunginhallitus oli mennyt toimivaltaansa ulommaksi, kun se oli päättänyt olla ryhtymättä toimenpiteisiin asemakaavamuutoshakemuksen johdosta saattamatta asiaa kaupunginvaltuuston käsiteltäväksi.</p>
