<h1>KHO:1997:112</h1>
<p>Lääninveroviraston tuli jättää toistamiseen tehty velkakirjasta suoritetun leimaveron palautushakemus tutkimatta, kun uusi hakemus perustui hallintotuomioistuimen muussa asiassa antamaan toisenlaisen tulkinnan sisältävään ratkaisuun.</p>
<p>LeimaveroL 95 §</p>
