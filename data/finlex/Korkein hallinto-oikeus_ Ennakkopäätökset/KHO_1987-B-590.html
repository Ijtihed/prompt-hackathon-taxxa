<h1>KHO:1987-B-590</h1>
<p>Verovelvollinen suoritti peruskoulun oppimäärää kansalaisopistossa, jolla oli oikeus antaa todistuksia peruskoulun oppimäärän suorittamisesta. Hän sai opetusta 8-10 tuntia viikossa. Hänellä oli oikeus tehdä tulostaan opiskelijavähennys. Verovuosi_1982</p>
<p>TVL 36 § 1 mom 4 kohta</p>
