<h1>KHO:1988-A-63</h1>
<p>Rakennusjärjestykseen ei saanut sisällyttää määräystä, jonka mukaan vapaa-ajanrakennuksen rakennuspinta-ala rajoitettiin 20 neliömetriin. Tällaisen rajoituksen sisältänyt rakennusjärjestys jätettiin vahvistamatta.</p>
<p>Byggnadslagen för landskapet Åland 14 §</p>
