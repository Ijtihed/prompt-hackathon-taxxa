<h1>KHO:1997:69</h1>
<p>Yhtiöllä oli oikeus vähentää verollisena ilmoitettua myyntiä koskevana luottotappiona määrä, joka oli yhtiön asiakkaan hyväksytyssä velkasaneerausohjelmassa leikattu yhtiön tuolta asiakkaalta olevasta myyntisaatavasta.</p>
<p>ArvonlisäveroL 78 § 1 mom 2 kohta</p>
