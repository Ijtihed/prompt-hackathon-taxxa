<h1>KHO:1990-A-103</h1>
<p>Kun yksityisen tien liittymän käyttötarkoitusta ei ollut aikaisemmin vahvistetussa liittymäsuunnitelmassa rajoitettu, liittymän lisäkäyttöön ei tarvittu tienpitoviranomaisen lupaa.</p>
<p>L yleisistä teistä 52 § 1 mom</p>
