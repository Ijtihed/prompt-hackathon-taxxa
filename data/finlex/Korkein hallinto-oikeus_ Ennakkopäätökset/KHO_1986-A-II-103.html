<h1>KHO:1986-A-II-103</h1>
<p>Kalankasvatustoiminnan harjoittaja oli velvollinen vaadittaessa antamaan ao. vesipiirin vesitoimistolle kalankasvatuslaitoksen hoitopäiväkirjassa esitettävien tietojen luotettavuuden tarkistamiseksi tarpeelliset tiedot ja selvitykset.</p>
<p>VesiL 10 luku 24 § 2 mom</p>
