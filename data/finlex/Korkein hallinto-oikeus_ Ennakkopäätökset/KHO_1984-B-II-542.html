<h1>KHO:1984-B-II-542</h1>
<p>Osingonjakovähennys voitiin tehdä jo osakeyhtiön osakepääoman korotuksen maksuvuodelta, kuitenkin edellytyksin, että osakepääoman korotus oli merkitty kaupparekisteriin ennen osingon maksamista. Verovuosi_1983 Ennakkotieto.</p>
<p>ElinkVL 61 § 1 mom</p>
