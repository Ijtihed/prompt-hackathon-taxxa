<h1>KHO:1984-A-II-101</h1>
<p>Säännöstelyluvan perustuminen vesioikeuslain (31/02) säännöksiin ei estänyt lainvoimaiseen lupapäätökseen sisältyvän määräyksen muuttamista luvansaajan hakemuksesta, milloin olosuhteet olivat muuttuneet siitä, kun määräys oli annettu.</p>
