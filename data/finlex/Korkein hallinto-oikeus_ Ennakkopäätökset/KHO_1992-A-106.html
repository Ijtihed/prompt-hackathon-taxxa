<h1>KHO:1992-A-106</h1>
<p>Yhtiöjärjestyksen kohta, jonka mukaan yhtiössä, jossa oli Aja B-osakkeita, yhtiön A-sarjan osakkeiden siirtyessä lunastusoikeus oli ensisijaisesti vain A-sarjan osakkailla ja toissijaisesti yhtiöllä oli osakeyhtiölain 2 §:n vastainen.</p>
<p>OYL 7 luku 2 §</p>
