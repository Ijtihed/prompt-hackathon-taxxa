<h1>KHO:1981-A-II-37</h1>
<p>Palo- ja pelastustoimen johtosäännössä oli palopäällikön virkaa varten voitu asettaa ankarammat kelpoisuusvaatimukset kuin mitä palo- ja pelastustoimesta annetussa laissa oli säädetty. Johtosääntö ei ollut lain kanssa ristiriidassa.</p>
<p>Samoin D:5582/32/80</p>
