<h1>KHO:1983-B-II-569</h1>
<p>Kunnallinen perhepäivähoitaja oli palkkatulon lisäksi saanut erillisen 6 933 mk:n hoitokulukorvauksen. Hänen tulostaan ei enää vähennetty tulo- ja varallisuusverolain 28 §:ssä tarkoitettua palkkatulovähennystä. Verovuosi_1979</p>
