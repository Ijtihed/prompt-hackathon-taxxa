<h1>KHO:1992-B-503</h1>
<p>Tulo- ja varallisuusverolain 14 §:ssä tarkoitetut vieraan valtion diplomaattiset edustajat ja muut heihin verrattavat henkilöt eivät olleet velvollisia suorittamaan lähdeveroa korkotulon lähdeverosta annetun lain 3 §:ssä tarkoitetuista korkotuloistaan. Ennakkotieto vuodelle 1991.</p>
