<h1>KHO:1981-A-II-5</h1>
<p>Väitöskirjatyö, joka koski yhden henkilön taiteellista työtä, oli sellainen verotuslain 132 §:n 6 mom:ssa tarkoitettu tieteellinen tutkimus, jota varten verohallitus voi määrätä verotustiedot ja -asiakirjat annettavaksi tällaista tutkimusta suorittavan henkilön käytettäväksi.</p>
