<h1>KHO:1985-A-II-60</h1>
<p>Kuntasuunnitelman hyväksymistä koskeva valtuuston päätös koski vain valmistelua. Sanotusta päätöksestä ei niin ollen kunnallislain 139 §:n 3 momentin mukaan saanut tehdä valitusta.</p>
<p>Äänestys 6-1.</p>
<p>KunL 139 § 3 mom</p>
