<h1>KHO:1986-A-II-115</h1>
<p>Konkurssin johdosta saamatta jäänyttä veloitettua myyntihintaa, joka oli maksukaudella luottotappiona poistettu kirjanpidosta, oli pidettävä suurilta kana- ja sikatalousyrityksiltä kannettavista markkinoimismaksuista annetun lain 4 §:ssä tarkoitettuna myyntihinnan oikaisueränä.</p>
