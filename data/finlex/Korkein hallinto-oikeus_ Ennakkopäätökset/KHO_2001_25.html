<h1>KHO:2001:25</h1>
<p>Vesivoiman käyttöoikeuden luovutuksesta ei ollut suoritettava varainsiirtoveroa. Vesivoiman käyttöoikeutta ei ollut myöskään pidettävä osana samalla  luovutuskirjalla luovutettua maanvuokraoikeutta.</p>
<p>Varainsiirtoverolaki 4 § 1 mom. ja 5 §
                    Maakaari 14 luku 2 §
                    Vesilaki 3 luku 6 §</p>
