<h1>KHO:1981-B-II-524</h1>
<p>Osakeyhtiö ei saanut vähentää katumaksua elinkeinotulostaan aikaisemmin kuin sinä vuonna, jona kunnanhallitus määräsi ja maksuunpani yhtiölle tuon maksun. Ennakkotieto. Verovuosi_1981. Verovuosi_1982.</p>
<p>ElinkVL 22 §</p>
