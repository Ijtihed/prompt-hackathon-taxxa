<h1>KHO:1985-A-II-120</h1>
<p>Kuntien ja kuntainliittojen valtionosuuksista ja -avustuksista annetun lain 27 §:n mukaista hakemusta ei voitu tehdä, kun lääninhallitus oli jo ratkaissut samoja kustannuksia koskevan asian oikaisuvaatimukseen antamallaan päätöksellä.</p>
<p>KVOL 27 §</p>
