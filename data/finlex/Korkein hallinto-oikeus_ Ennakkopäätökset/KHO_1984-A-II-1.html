<h1>KHO:1984-A-II-1</h1>
<p>Auton maahan tuoneella yhtiöllä ja henkilöllä, jolle yhtiö oli myynyt saman auton, oli asianosaisena oikeus saada auton rekisteröimiseksi tarpeelliset jäljennökset muutoin salassa pidettävistä tullausasiakirjoista.</p>
<p>AsiakJulkL 19 §
                    AsiakJulkA 1 § 1 mom 9 kohta
                    TulliL 67 § 1 mom</p>
