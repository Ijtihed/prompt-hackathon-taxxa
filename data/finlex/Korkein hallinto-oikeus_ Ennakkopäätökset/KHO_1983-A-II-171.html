<h1>KHO:1983-A-II-171</h1>
<p>Invalidihuoltoon katsottiin voivan kuulua myös sellaisen laitteen korjaaminen, jota ei ollut myönnetty invalidihuoltona, edellyttäen, että kysymyksessä oleva laite olisi voitu myöntää invalidihuoltona.</p>
<p>Äänestys 3-2.</p>
<p>InvaliidihuoltoL 6 § 1 mom</p>
