<h1>KHO:1982-A-II-74</h1>
<p>Asiakirjoista saatavan selvityksen perusteella farmaseuttisen erikoisvalmisteen hintaa ei voitu vahvistaa niin alhaiseksi kuin lääkintöhallituksen päätöksessä oli tehty. Asia palautettiin lääkintöhallitukselle.</p>
<p>ApteekkitavaraL 10 a §</p>
