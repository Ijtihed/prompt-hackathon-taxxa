<h1>KHO:1988-A-98</h1>
<p>Kunnanhallituksella oli valitusoikeus lääkintöhallituksen päätöksestä, jolla kunnan alueella sijaitseva apteekki oli muutettu sivuapteekiksi. Asia siirrettiin hallituksen ratkaistavaksi.</p>
