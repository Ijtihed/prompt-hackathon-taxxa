<h1>KHO:1988-B-539</h1>
<p>Henkilön työstä aiheutuvan oleskelun ulkomailla ei katsottu keskeytyvän sen johdosta, että hän käytti säännönmukaisen vuosilomansa työskentelyvaltiossa kielten opiskeluun. Verovuosi_1987 Ennakkotieto.</p>
<p>TVL 22 b § (1136/85)</p>
