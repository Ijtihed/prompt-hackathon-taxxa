<h1>KHO:1980-B-II-661</h1>
<p>Koska henkilö ei ollut hakenut kansaneläkelain mukaista työkyvyttömyyseläkettä, ei häntä voitu pitää kansaneläkelain mukaan työkyvyttömäksi todettuna. Tämän vuoksi hänelle oli ollut määrättävä vahvistettujen veroäyrien perusteella kansaneläkevakuutusmaksu.</p>
<p>KansaneläkeL 6 § 1 mom</p>
