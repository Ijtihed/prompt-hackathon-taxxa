<h1>KHO:1991-A-57</h1>
<p>Lääninasiamiehellä ei ollut oikeutta hakea muutosta lääninoikeuden päätökseen, jolla oli kumottu vastuunalaisen lääkärin päätös henkilön ottamisesta mielisairaalaan tahdostaan riippumatta.</p>
<p>MielisairasL 16 a §
                    LääninoikeusL 13 §
                    LääninoikeusL 28 § 2 mom</p>
