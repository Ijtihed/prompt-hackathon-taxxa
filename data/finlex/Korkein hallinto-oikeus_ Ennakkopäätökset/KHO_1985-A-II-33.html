<h1>KHO:1985-A-II-33</h1>
<p>Kunnanvaltuuston päätös, jolla oli hyväksytty valtioneuvoston päätöksessä ilmoitetut ehdot eräiden tilojen luovuttamisesta kunnalle perintökaaren 5 luvun 2 §:n nojalla, ei periaatepäätöksenä sisältänyt valituskelpoista ratkaisua.</p>
<p>KunL 139 § 3 mom</p>
