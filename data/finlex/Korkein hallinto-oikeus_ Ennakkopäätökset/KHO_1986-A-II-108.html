<h1>KHO:1986-A-II-108</h1>
<p>Mies ja nainen, joilla oli yhteinen lapsi, asuivat yhdessä avioliitonomaisissa olosuhteissa. Heitä oli näissä oloissa pidettävä ajo-opetuslupaa koskevassa asiassa saman perheen jäseninä.</p>
<p>TieliikenneL 68 § 1 mom 2 kohta</p>
