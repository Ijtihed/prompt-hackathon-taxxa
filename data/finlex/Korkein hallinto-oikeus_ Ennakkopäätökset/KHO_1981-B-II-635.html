<h1>KHO:1981-B-II-635</h1>
<p>Kun yhtiö ei ollut tavaraa tullattaessa kirjallisesti vaatinut e-tulliedun myöntämistä, yhtiön verotuksessa, ottaen huomioon tullitariffin soveltamisesta annetun asetuksen (175/75) 4 §:n, ei ollut tapahtunut sellaista virhettä, jota tarkoitetaan tullilain (271/39) 113 §:ssä.</p>
