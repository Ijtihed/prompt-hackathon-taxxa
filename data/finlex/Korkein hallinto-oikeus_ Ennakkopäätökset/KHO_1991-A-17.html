<h1>KHO:1991-A-17</h1>
<p>Merimieseläkelain mukainen varhennettu vanhuuseläke oli 18.1.1989 toimitetussa yhteensovituksessa valtion eläkelain mukaisen vanhuuseläkkeen kanssa otettava huomioon varhennettuna eikä sen suuruisena, kuin eläke olisi ilman varhennusvähennystä.</p>
<p>VEL 12 §
                    TEL 8 §</p>
