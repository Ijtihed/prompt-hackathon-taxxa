<h1>KHO:2007:23</h1>
<p>Helsingin sosiaalilautakunta oli syksyllä 2004 voinut hylätä Egyptissä vuodesta 1999 lukien oleskelleen henkilön hakemuksen toimeentulotuen myöntämisestä Suomeen matkustamisesta aiheutuviin kuluihin.</p>
<p>Laki toimeentulotuesta 1 §:n 1 momentti ja 14 §</p>
<p>Kort referat på svenska</p>
