<h1>KHO:1981-A-II-114</h1>
<p>Vapautus työtuntijärjestelmän laatimisesta voitiin myöntää vain osaa työpaikan henkilökunnasta koskevana sekä sillä tavoin, että työtuntijärjestelmässä oli mainittava vain aika, milloin työ alkoi, sekä yhdenjaksoisen viikkolevon aika.</p>
<p>TyöaikaL 20 § 1 mom</p>
