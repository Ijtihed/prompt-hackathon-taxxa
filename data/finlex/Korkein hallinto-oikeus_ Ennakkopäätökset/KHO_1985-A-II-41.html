<h1>KHO:1985-A-II-41</h1>
<p>Kunnanvaltuuston päätöstä ei ollut tehty virheellisessä järjestyksessä, vaikka varavaltuutettu oli saapunut valtuuston kokoukseen kysymyksessä olevan asian käsittelyn aikana ja valtuuston päätös oli äänten mentyä tasan ratkennut puheenjohtajan äänellä.</p>
<p>KunL 25 § 2 mom</p>
