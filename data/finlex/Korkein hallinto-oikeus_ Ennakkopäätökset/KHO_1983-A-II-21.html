<h1>KHO:1983-A-II-21</h1>
<p>Verohallitus myönsi X:lle hänen pyynnöstään eron verotoimiston toimistopäällikön virasta. X valitti päätöksestä KHO:lle, koska hän ei ollut hakenut eroa vapaasta tahdostaan. KHO ratkaisi asian lopullisesti ja hylkäsi valituksen.</p>
