<h1>KHO:1986-A-II-68</h1>
<p>Rakennuslautakunta ei voinut olla hyväksymättä henkilöä rakennustyötä johtavaksi ja siitä vastaavaksi työnjohtajaksi sillä perusteella, että hän oli omaan käyttöönsä tulevan uudisrakennuksen rakentaja.</p>
<p>RakennusA 132 §</p>
