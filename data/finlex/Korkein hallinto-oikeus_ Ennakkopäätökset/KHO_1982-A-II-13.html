<h1>KHO:1982-A-II-13</h1>
<p>Kaupunginhallitus oli jakaessaan avustuksia eläkeläisjärjestöille sivuuttanut tasapuolisuuden vaatimuksen ja siten ylittänyt toimivaltansa. Avustusta hakeneiden järjestöjen toiminnan laatua, laajuutta ja merkitystä ei ollut otettu riittävästi huomioon.</p>
