<h1>KHO:1988-A-45</h1>
<p>Sosiaalilautakunnan huostassa oleva lapsi oli myös 16 ikävuoden täyttämisen jälkeen henkikirjoitettava siinä kunnassa, jonka sosiaalilautakunnan huostassa hän oli.</p>
