<h1>KHO:1984-A-II-149</h1>
<p>Lääninhallituksen hallintokanteluun antamalla päätöksellä asiassa, jossa oli tutkittu kunnan viranomaisten noudattaman menettelyn oikeellisuus, ei voitu tuomita kantelun tekijän maksettavaksi kunnan vaatimia oikeudenkäyntikuluja.</p>
