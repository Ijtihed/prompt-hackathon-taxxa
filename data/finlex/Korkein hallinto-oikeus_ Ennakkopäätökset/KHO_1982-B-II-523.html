<h1>KHO:1982-B-II-523</h1>
<p>Rakennusliikettä harjoittava yhtiö ei saanut käyttää investointivaraustaan sellaisen teollisuus-, varasto- ja konttorirakennuksen hankintamenon kattamiseen, jonka se valmistuttuaan antoi vuokralle. Sitova asianomaisilta vuosilta. Ennakkotieto.</p>
<p>InvestointivarausL 9 §</p>
