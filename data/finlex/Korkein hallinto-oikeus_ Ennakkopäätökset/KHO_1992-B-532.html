<h1>KHO:1992-B-532</h1>
<p>Kylpylähotelli hankki koko henkilökunnalleen yhtenäiset vain työpaikalla käytettävät työpuvut, joissa oli tropiikkiaiheinen värikäs kuvio. Työpukujen arvoa ei pidetty ennakkoperintälain 4 §:ssä tarkoitettuna palkkana. Ennakkotieto.</p>
<p>EnnakkoperintäL 4 §</p>
