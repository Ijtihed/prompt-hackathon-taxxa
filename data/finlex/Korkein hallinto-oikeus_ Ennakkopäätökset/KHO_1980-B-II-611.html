<h1>KHO:1980-B-II-611</h1>
<p>Palkkio, jonka koripallo-ottelun järjestävä seura maksoi koripalloliiton ottelun erotuomariksi määräämälle henkilölle, oli ennakkoperintälain 4 §:ssä tarkoitettua palkkaa, josta oli suoritettava työnantajan sosiaaliturvamaksu. Verovuosi_1979 Verovuosi_1980</p>
