<h1>KHO:1981-A-II-54</h1>
<p>Noin 30 m:n korkuinen radiomasto ei ollut uudisrakennus. Maston pystyttämistä oli pidettävä RakennusA 50 §:n 6 mom:ssa tarkoitettuna rakennustoimenpiteenä. Tällaiseen rakentamiseen tarvittiin rakennusjärjestyksen mukainen lupa.</p>
<p>RakennusA 50 §
                    RakennusA 53 §</p>
