<h1>KHO:1986-A-II-32</h1>
<p>Kunnanvaltuusto oli päättänyt ottaa pankilta lainan vanhainkodin laajennuksen rahoitukseen. Valtuutettu, joka oli kysymyksessä olevan pankin johtokunnan jäsen, ei ollut esteellinen ottamaan osaa valtuustossa päätöksen tekemiseen mainitusta asiasta.</p>
<p>KunL 25 §
                    KunL 139 §</p>
