<h1>KHO:1984-A-II-140</h1>
<p>Lääninhallituksen ei olisi tullut toimivaltaansa kuulumattomana jättää vahingonkorvausvaatimusta tutkimatta selvittämättä ensin, oliko asiassa edellytyksiä vapaaehtoisesti hallinnollisessa järjestyksessä maksaa valtiolta vaadittu korvaus aiheutuneesta vahingosta.</p>
