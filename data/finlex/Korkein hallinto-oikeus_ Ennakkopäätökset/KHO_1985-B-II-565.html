<h1>KHO:1985-B-II-565</h1>
<p>Maatalouden investointivarauslaissa investointitalletuksen tekemiselle säädetty määräaika ei ole ylimääräisestä muutoksenhausta hallintoasioissa annetun lain 4 §:n tarkoittama määräaika eikä sitä voida palauttaa.</p>
