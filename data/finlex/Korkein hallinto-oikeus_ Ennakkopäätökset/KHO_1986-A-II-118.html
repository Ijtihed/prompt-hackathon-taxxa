<h1>KHO:1986-A-II-118</h1>
<p>Sosiaalihuoltolain 49 §:n 1 momentissa oleva kielto valittaa lääninoikeuden päätöksestä, joka koskee toimeentulotuen antamista tai määrää, sisältää valituskiellon myös toimeentulotuen epäämistä koskevasta lääninoikeuden päätöksestä.</p>
