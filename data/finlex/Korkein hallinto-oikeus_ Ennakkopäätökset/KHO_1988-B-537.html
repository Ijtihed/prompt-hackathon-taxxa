<h1>KHO:1988-B-537</h1>
<p>Paikkakunnalla ilmestyvä sanomalehti oli lehden kustantajan toimesta lähetetty ilmaiseksi poliisimiehille heidän kotiosoitteisiinsa. Tästä ei muodostunut poliisimiehelle veronalaista tuloa.</p>
<p>Äänestys 4-1.</p>
<p>Verovuosi_1985</p>
<p>TVL 19 §</p>
