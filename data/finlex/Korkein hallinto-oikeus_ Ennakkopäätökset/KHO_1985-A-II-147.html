<h1>KHO:1985-A-II-147</h1>
<p>Kirkkohallituksen päätös, jolla oli vahvistettu kirkkovaltuuston päätös seurakunnan maan myymisestä, ei koskenut valittajina olevien seurakunnan jäsenten oikeutta sillä tavoin, että heillä olisi oikeus siitä valittaa. Valitus jätettiin tutkimatta.</p>
<p>KirkkoL 494 §</p>
