<h1>KHO:1986-A-II-3</h1>
<p>Nuorisolautakunnalla ei ollut oikeutta valittaa lääninoikeuden päätöksestä asiakirjan julkisuutta koskevassa asiassa, jossa lautakunta oli antanut prosessin pohjana olevan päätöksen.</p>
