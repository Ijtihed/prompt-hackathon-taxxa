<h1>KHO:1982-A-II-106</h1>
<p>Yhdistyslain 16 §:ssä tarkoitettuna erityisesti ilmoitettuna asiana, joka oikeuttaa kutsumaan koolle yhdistyksen kokouksen, ei pidetty yhdistyksen hallituksen tapaa hoitaa yhdistyksen asioita.</p>
