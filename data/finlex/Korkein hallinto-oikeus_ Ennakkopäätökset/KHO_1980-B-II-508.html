<h1>KHO:1980-B-II-508</h1>
<p>Koska valtion ravitsemuskeskus toimi pääasiallisesti valtion laitosten tarpeiden tyydyttämiseksi, se ei ollut liiketoiminnastaan kunnallisverotuksessa verovelvollinen. Verovuosi_1975.</p>
<p>TVL 12 § 2 mom</p>
<p>Äimä: Verotus 1/1982  s. 30-39</p>
