<h1>KHO:1987-B-685</h1>
<p>Karpalot poimittiin Neuvostoliitossa jäätyneinä ja pakattiin puutynnyreihin. Suomeen saapuessa tavara oli umpijäässä. Tavara oli tariffioitava jäädyttämällä säilytettyinä tullinimikkeeseen 08.10.929 eikä nimikkeeseen 08.08.900.</p>
<p>Äänestys 4-3.</p>
<p>Ennakkotieto.</p>
