<h1>KHO:1987-B-577</h1>
<p>Maalarimestari oli eläkkeelle siirtymisestään huolimatta säilyttänyt jäsenyytensä ammattiyhdistyksessä. Tälle maksettu jäsenmaksu ei ollut eläketulosta vähennyskelpoinen erä.</p>
<p>Äänestys 5-2.</p>
<p>TVL 26 § 1 mom 4 kohta</p>
<p>Kilpi: Defensor Legis 1988 s.207-208</p>
