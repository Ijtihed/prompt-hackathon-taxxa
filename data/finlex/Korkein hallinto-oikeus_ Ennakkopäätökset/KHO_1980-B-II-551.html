<h1>KHO:1980-B-II-551</h1>
<p>Vuorotyöläisen halvimmaksi kulkuneuvoksi katsottiin oma auto niinä työvuoroina, joihin julkista liikennettä ei ollut lainkaan käytettävissä tai joilla meno- tai paluumatkaa ei voinut suorittaa julkisella kulkuneuvolla. Verovuosi_1975.</p>
