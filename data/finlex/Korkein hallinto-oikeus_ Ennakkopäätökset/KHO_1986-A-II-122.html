<h1>KHO:1986-A-II-122</h1>
<p>Veronkantolain 16 §:n 3 momentissa mainittu maksuunpanotilityksessä suoritettaville tai perittäville määrille laskettava korotus ei ollut sellainen valtiolle tuleva maksu tai korvaus, jota tarkoitetaaan maksuvapautuslaissa.</p>
