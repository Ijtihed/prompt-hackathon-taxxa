<h1>KHO:1983-A-II-158</h1>
<p>Lääninhallituksen päätös, jolla oli myönnetty ravintolalle lupa tanssin järjestämiseen, ei koskenut saman talon asukkaiden oikeutta sillä tavoin, että heillä olisi oikeus hakea siihen muutosta. KHO jätti valituksen tutkimatta.</p>
<p>AlkoholiL 53 §
                    TerveydenhoitoL 82 §</p>
