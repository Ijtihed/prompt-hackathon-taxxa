<h1>KHO:1982-A-II-9</h1>
<p>Majoitus- ja ravitsemisliikkeistä annetun asetuksen 39 §:ssä tarkoitettu hotellin matkustajakortti oli eräitä poikkeuksia yleisten asiakirjain julkisuudesta sisältävän asetuksen 1 §:n 1 momentin 4 kohdassa tarkoitettu salassa pidettävä asiakirja.</p>
