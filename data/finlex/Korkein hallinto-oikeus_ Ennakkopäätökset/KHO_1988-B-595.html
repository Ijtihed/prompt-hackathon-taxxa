<h1>KHO:1988-B-595</h1>
<p>Kun perinnönjako oli jo toimitettu, perintöveron perusteeksi oli kunkin perillisen kohdalla pantava se arvo, mikä hänelle jaetulla omaisuudella oli verovelvollisuuden alkaessa.</p>
<p>PerVL 25 § 3 mom
                    PerVL 33 § 1 mom
                    PerVL 36 §
                    PerVL 49 §</p>
