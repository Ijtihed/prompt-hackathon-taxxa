<h1>KHO:1980-A-II-113</h1>
<p>Kunnan tielautakunnalla ei ole asianosaisen puhevaltaa yksityisen tien valtionavustusta koskevassa asiassa eikä näin ollen oikeutta hakea valittamalla muutosta lääninhallituksen antamaan valtionavustusta koskevaan päätökseen.</p>
