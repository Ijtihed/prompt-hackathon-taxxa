<h1>KHO:1994-A-12</h1>
<p>Apteekkien eläkekassan A-osaston rekisteröimätöntä vanhuuseläkettä ei yhteensovitettu kunnallisen eläkelaitoksen eläkesäännön mukaisen lisäeläkkeen kanssa siltä osin kuin eläkkeensaaja oli joutunut sen itse kyseisen eläkekassan jäsenenä kustantamaan.</p>
<p>KES 19 § 1 mom
                    KES 19 § 3 mom</p>
