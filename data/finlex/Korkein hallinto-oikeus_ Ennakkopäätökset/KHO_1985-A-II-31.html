<h1>KHO:1985-A-II-31</h1>
<p>Kun kunnalle etuostolain mukaan kuuluvat tehtävät saman lain 21 §:n mukaan hoiti kunnanhallitus, oli kunnanvaltuusto ylittänyt toimivaltansa päättäessään, että kunta käyttää sanotun lain 1 §:ssä tarkoitettua etuosto-oikeutta.</p>
