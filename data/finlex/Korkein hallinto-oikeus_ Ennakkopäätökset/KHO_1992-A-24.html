<h1>KHO:1992-A-24</h1>
<p>Se, että lääninhallitus oli lainvoiman saaneella päätöksellä hylännyt erityistä tarkastusta koskevan hakemuksen, ei ollut esteenä uuden, osittain toisiin seikkoihin perustuvan hakemuksen tutkimiselle.</p>
<p>Äänestys 3-2.</p>
