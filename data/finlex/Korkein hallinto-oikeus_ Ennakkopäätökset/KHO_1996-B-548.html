<h1>KHO:1996-B-548</h1>
<p>Kauppakirjaa oli pidettävä leimaverolain 16 §:n mukaisena kiinteistön omistusoikeuden luovutuskirjana myös siltä osin kuin sillä oli luovutettu tilaan kuuluneet osuudet yhteismetsään.</p>
<p>LeimaveroL 16 §
                    YhteismetsäL 1 § 2 mom
                    YhteismetsäL 2 § 1 mom
                    YhteismetsäL 9 §
                    YhteismetsäL 10 §</p>
