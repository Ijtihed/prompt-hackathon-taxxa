<h1>KHO:1983-A-II-188</h1>
<p>Rahan arvon huomattava alentuminen oli sellainen avustuskassalain 107 §:ssä tarkoitettu erityinen syy, jonka perusteella sosiaali- ja terveysministeriö voi myöntää poikkeuksia sanotun lain 3 §:n säännöksistä.</p>
<p>Äänestys 3-1.</p>
<p>AvustuskassaL 3 §
                    AvustuskassaL 107 §</p>
