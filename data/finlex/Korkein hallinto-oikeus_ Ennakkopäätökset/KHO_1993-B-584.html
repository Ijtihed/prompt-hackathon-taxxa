<h1>KHO:1993-B-584</h1>
<p>Määräalan myyjällä ei ollut oikeutta valittamalla hakea muutosta käräjätuomarin toimenpiteeseen, jolla lainhuudon hakijat oli määrätty suorittamaan leimaveroa määräalasta muodostetun tilan saantokirjoistaan.</p>
<p>Äänestys 4-3.</p>
<p>LeimaveroL 92 § 1 mom
                    HValL 11 a §</p>
