<p>Valtion tulo- ja menoarviossa osoitetuista varoista myönnetyn lainan takaisin maksamisesta ei valtiokonttori voinut myöntää vapautusta maksuvapautuslain nojalla.</p>
<p>L valtion tulo- ja menoarvion ja tilinpäätöksen perusteista  2 d §
