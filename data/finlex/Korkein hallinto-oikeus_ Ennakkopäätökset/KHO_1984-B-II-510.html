<h1>KHO:1984-B-II-510</h1>
<p>Puolisoiden kuoleman jälkeen muodostuneita kuolinpesiä oli verotettava erillisinä verovelvollisina, vaikka kuolinpesien osakkaat muodostuivat puolisoiden yhteisistä lapsista, joilla oli samansuuruiset osuudet kummassakin kuolinpesässä. Verovuosi_1981</p>
