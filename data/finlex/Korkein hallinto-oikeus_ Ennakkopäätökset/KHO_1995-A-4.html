<h1>KHO:1995-A-4</h1>
<p>Maakuntahallituksen päätös, jolla se oli hylännyt Ruotsissa kotipaikan omaavan yhtiön hakemuksen saada vuokrasopimuksin hallita kiinteää omaisuutta maakunnassa, ei merkinnyt yhtiön syrjimistä muiden ETA-valtioiden yrityksiin verrattuna.</p>
<p>Ahvenanmaan maanhankintaL 2 §</p>
