<h1>KHO:1990-A-64</h1>
<p>Neljä kaivamalla ja patoamalla muodostettua tekolampea, joiden yhteinen pinta-ala oli 2,29 hehtaaria, eivät muodostaneet sellaista vesilain 1 luvun 1 §:n 2 momentissa ja rakennuslain 123 a §:ssä tarkoitettua vesistöä, jonka rannalle aiottu loma-asutus voitiin järjestää rantakaavalla.</p>
