<h1>KHO:1987-B-594</h1>
<p>Äidin ja pojan välisen kiinteistökaupan yhteydessä oli sovittu, että osa kauppahinnasta maksetaan ostajan veljelle. Verovuoden päättyessä maksamatta ollut kauppahinnan osa ei ollut ostajan veljen veronalaista varallisuutta. Verovuosi_1983</p>
<p>TVL 39 §
                    LahjanlupausL 1 §</p>
