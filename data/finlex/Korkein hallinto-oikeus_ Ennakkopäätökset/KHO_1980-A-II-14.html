<h1>KHO:1980-A-II-14</h1>
<p>Kunnanvaltuusto oli päättänyt myöntää määrärahan käytettäväksi liikehuoneiston käyttöön oikeuttavien osakkeiden hankkimiseen. Liikehuoneisto oli tarkoitus vuokrata apteekkarille apteekkitiloiksi. Päätöksen tekimisen ei katsottu kuuluvan kunnan toimialaan.</p>
<p>KunL 5 §
                    KunL 139 §</p>
