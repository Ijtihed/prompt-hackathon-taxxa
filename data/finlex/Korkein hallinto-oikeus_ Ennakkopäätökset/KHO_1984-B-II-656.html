<h1>KHO:1984-B-II-656</h1>
<p>Yhtiölle, joka toi maahan omilla lentokoneillaan lentolippuja rahtivapaasti, ei aiheutunut lippujen toimittamisesta kuljetuskustannuksia. Lippujen hinnaston mukaan laskettua rahtia ei ollut sisällytettävä lippujen tullausarvoon.</p>
<p>TullausarvoL 9 § 1 mom
                    TullausarvoL 12 §</p>
