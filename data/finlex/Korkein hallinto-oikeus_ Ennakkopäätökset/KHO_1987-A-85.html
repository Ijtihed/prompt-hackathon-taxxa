<h1>KHO:1987-A-85</h1>
<p>Tuomiokapituli oli päättänyt nimittää P:n hiippakuntasihteerin virkaan. Mainitusta päätöksestä valitettiin, kun otettiin huomioon kirkkolain 464 §:n 1 momentin säännökset, valtioneuvostoon. KHO siirsi asian valtioneuvoston käsiteltäväksi.</p>
<p>HValL 13 § 2 mom</p>
