<h1>KHO:1997:57</h1>
<p>Alkoholijuomien anniskelulupaa koskevaa hakemusta ei voitu hylätä sillä perusteella, ettei alueella sosiaali- ja terveydenhuollon tuotevalvontakeskuksen arvion mukaan ollut tarvetta uudelle anniskelupaikalle.</p>
<p>AlkoholiL 1 §
                    AlkoholiL 21 §
                    HallintomenettelyL 24 §</p>
