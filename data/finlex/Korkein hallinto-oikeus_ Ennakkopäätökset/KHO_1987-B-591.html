<h1>KHO:1987-B-591</h1>
<p>Verovelvollisella, joka opiskeltuaan kolme kuukautta peruskoulun yläasteella oli käynyt sen jälkeen Oulun talouskoulun viisi kuukautta kestäneen talouskoulukurssin, oli oikeus opiskelijavähennykseen.</p>
<p>Äänestys 3-1.</p>
