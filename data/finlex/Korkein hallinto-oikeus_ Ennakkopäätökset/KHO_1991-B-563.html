<h1>KHO:1991-B-563</h1>
<p>Oy:n lunastaessa osakepääomaa alentamatta vapaalla omalla pääomalla osakkailtaan omia osakkeitaan se ei saanut sellaista varallisuuden lisäystä, josta yhtiölle perintö- ja lahjaverlain 1 §:n ja 18 §:n nojalla olisi määrättävä lahjaveroa.</p>
<p>PerVL 1 §
                    PerVL 18 §
                    OYL 7 luku 2 §</p>
