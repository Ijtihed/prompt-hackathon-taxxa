<h1>KHO:1987-A-96</h1>
<p>Luvallisesti metsästettäessä kaadettu sairas hirvieläin kuului sen kaataneelle metsästysseuralle, vaikka nimismies oli hirvieläinten metsästyksestä annetun asetuksen 13 §:n 5 momentin nojalla myöntänyt metsästysseuralle kaadetun hirven tilalle uuden kaatoluvan.</p>
<p>MetsästysL 67 § 3 mom</p>
