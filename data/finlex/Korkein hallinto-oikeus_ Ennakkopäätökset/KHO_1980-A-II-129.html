<h1>KHO:1980-A-II-129</h1>
<p>Kirkkohallituksen päätös, jolla oli jätetty vahvistamatta kirkkovaltuuston päätös seurakunnan omistaman maan myymisestä, ei loukannut ostajan oikeutta eikä hänellä siis ollut oikeutta valittaa kirkkohallituksen päätöksestä.</p>
<p>KirkkoL 494 §
                    KirkkoL 303 §</p>
