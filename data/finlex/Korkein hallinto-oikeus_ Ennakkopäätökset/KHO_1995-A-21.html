<h1>KHO:1995-A-21</h1>
<p>Kunnanhallituksella oli tieliikennelain 51 §:n 2 momentin mukainen pätevä syy evätä suostumus liikenteen ohjauslaitteen asettamiseen, koska tienpitäjinä olevat tieosakkaat eivät olleet yksimielisiä ohjauslaitteen asettamisesta.</p>
