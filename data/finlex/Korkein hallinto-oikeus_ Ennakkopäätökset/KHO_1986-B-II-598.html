<h1>KHO:1986-B-II-598</h1>
<p>Verovelvolliset eivät ennen perintöverotuksen toimittamista olleet esittäneet vaatimusta perintö- ja lahjaverolain 63 a §:n huojennussäännösten soveltamisesta. Vaatimusta ei voitu esittää enää lääninoikeudessa.</p>
<p>Vrt. D:4588/13/83 ja D:4994/13/84</p>
