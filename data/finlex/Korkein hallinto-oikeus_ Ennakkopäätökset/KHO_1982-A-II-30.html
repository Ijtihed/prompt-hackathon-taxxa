<h1>KHO:1982-A-II-30</h1>
<p>Ruotsissa suoritettua ekonomin tutkintoa ei pidetty kaupunginkamreerin viran pätevyysvaatimuksissa tarkoitettuna yliopistossa tai korkeakoulussa suoritettuna virkaan soveltuvana tutkintona.</p>
<p>KunL 139 §
