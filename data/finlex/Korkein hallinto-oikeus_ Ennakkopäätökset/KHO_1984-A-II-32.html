<h1>KHO:1984-A-II-32</h1>
<p>Yhdistyksellä, joka ei ollut kunnan jäsen, ei ollut oikeutta valittaa kaupunginhallituksen päätöksestä, jolla oli jaettu kunnan talousarviossa urheiluohjaajatyöhön varattu määräraha, josta yhdistys oli hakenut avustusta.</p>
<p>KunL 4 §
                    KunL 139 § 1 mom</p>
