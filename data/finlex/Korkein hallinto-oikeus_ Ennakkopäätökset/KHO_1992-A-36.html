<h1>KHO:1992-A-36</h1>
<p>Valtiokonttori oli toimivaltainen myöntämään vapautusta maanmittausmaksusta, vaikka lykkäyksen myöntäminen kuului maanmittauskonttorille.</p>
<p>MaksuvapautusL 1 §
                    L maanmittausmaksusta 11 §
                    A maanmittausmaksusta 9 §</p>
