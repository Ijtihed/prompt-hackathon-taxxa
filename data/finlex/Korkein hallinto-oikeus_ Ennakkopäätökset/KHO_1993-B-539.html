<h1>KHO:1993-B-539</h1>
<p>Maa- ja metsätalousmaana käytettyjen kiinteistöjen, joille ei ollut vahvistettu ranta- eikä muutakaan kaavaa ja joilta ei ollut myyty maata, ranta-alueille ei voitu perintöverotuksessa vahvistaa erityistä rantarakennuspaikan arvoa.</p>
