<h1>KHO:1989-A-87</h1>
<p>Päätös huostaanotetun lapsen sijaishuollon muuttamisesta laitoshuollosta perhehoidoksi oli valituskelpoinen ratkaisu, vaikka sijaisperheestä päätettiin vasta myöhemmin erikseen.</p>
<p>LastensuojeluL 19 §
