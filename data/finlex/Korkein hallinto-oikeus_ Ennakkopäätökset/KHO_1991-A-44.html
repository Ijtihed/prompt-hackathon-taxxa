<h1>KHO:1991-A-44</h1>
<p>Kaupunginhallituksen päätettyä korvata vainajan hautauskustannukset ja muistotilaisuuden kustannukset, kaupunki oli velvollinen korvaamaan myös hautajaisten järjestämiseen liittyvät kuolinilmoituksesta ja kiitosilmoituksesta aiheutuneet kustannukset.</p>
<p>Äänestys 3-2.</p>
