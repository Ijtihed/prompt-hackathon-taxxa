<h1>KHO:1988-A-2</h1>
<p>Poliisin laatima ja pitämä liikennelupakortisto ei ollut yleisten asiakirjain julkisuudesta annetun lain 9 §:n 2 momentissa tarkoitettu asiakirja, joka voitiin asetuksella säätää kaikkien siinä olevien tietojen osalta salassa pidettäväksi.</p>
