<h1>KHO:1992-A-44</h1>
<p>Kunnanvaltuusto ei voinut varainhoitovuoden päätyttyä päättää sellaisesta lisäyksestä talousarvion määrärahoihin, joka ei kohdistunut tuon varainhoitovuoden menoihin.</p>
<p>KunL 83 §
