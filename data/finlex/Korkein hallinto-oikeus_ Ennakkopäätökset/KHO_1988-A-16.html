<h1>KHO:1988-A-16</h1>
<p>Eläkkeensaajan ansioiden katsottiin kunnallisen eläkelaitoksen eläkesäännön 5 §:n 4 momentissa tarkoitetulla tavalla poikkeuksellisesta syystä alentuneen, kun hän ei ollut saanut palkkaa 1.9.1983-3.9.1984 välisenä aikana virantoimituksesta pidättämisen vuoksi.</p>
