<h1>Laki opintotuen muutoksenhakulautakunnasta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan opintotuen muutoksenhakulautakunnasta annettu laki (1080/2012).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2026.</p>
