<h1>Laki rikesakosta tieliikenteessä annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan rikesakosta tieliikenteessä 21 päivänä tammikuuta 1983 annettu laki (68/1983).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä lokakuuta 1999.</p>
