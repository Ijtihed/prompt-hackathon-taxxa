<h1>Laki omistusasuntolainojen korkotuesta annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan omistusasuntolainojen korkotuesta annettu laki (1204/1993).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 2026.</p>
