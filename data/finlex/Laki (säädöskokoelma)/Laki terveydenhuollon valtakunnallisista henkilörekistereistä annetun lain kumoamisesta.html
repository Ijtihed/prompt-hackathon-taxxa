<h1>Laki terveydenhuollon valtakunnallisista henkilörekistereistä annetun lain kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan terveydenhuollon valtakunnallisista henkilörekistereistä annettu laki (556/1989).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä toukokuuta 2019.</p>
