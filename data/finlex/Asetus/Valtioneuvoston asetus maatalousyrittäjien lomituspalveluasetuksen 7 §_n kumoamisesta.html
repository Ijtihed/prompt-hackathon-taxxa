<h1>Valtioneuvoston asetus maatalousyrittäjien lomituspalveluasetuksen 7 §:n kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan maatalousyrittäjien lomituspalveluasetuksen (1333/1996) 7 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 2013.</p>
