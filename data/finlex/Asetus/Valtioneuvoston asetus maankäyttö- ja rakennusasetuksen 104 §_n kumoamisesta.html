<h1>Valtioneuvoston asetus maankäyttö- ja rakennusasetuksen 104 §:n kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan maankäyttö- ja rakennusasetuksen (895/1999) 104 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 17 päivänä heinäkuuta 2013.</p>
