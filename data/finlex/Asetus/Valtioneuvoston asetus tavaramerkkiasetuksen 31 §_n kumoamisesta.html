<h1>Valtioneuvoston asetus tavaramerkkiasetuksen 31 §:n kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan tavaramerkkiasetuksen (296/1964) 31 §, sellaisena kuin se on asetuksessa 209/1979.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä syyskuuta 2013.</p>
