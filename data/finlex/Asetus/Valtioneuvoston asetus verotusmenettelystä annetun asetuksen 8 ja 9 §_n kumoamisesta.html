<h1>Valtioneuvoston asetus verotusmenettelystä annetun asetuksen 8 ja 9 §:n kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan verotusmenettelystä annetun asetuksen (763/1998) 8 ja 9 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 2013.</p>
