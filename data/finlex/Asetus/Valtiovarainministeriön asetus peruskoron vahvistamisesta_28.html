<h1>Valtiovarainministeriön asetus peruskoron vahvistamisesta</h1>
<p>Valtiovarainministeriö on eräistä viitekoroista 18 päivänä joulukuuta 1998 annetun lain (996/1998) 1 §:n nojalla vahvistanut peruskoroksi 4,50 prosenttia vuodessa 1 päivästä heinäkuuta 2000 vuoden 2000 loppuun.</p>
