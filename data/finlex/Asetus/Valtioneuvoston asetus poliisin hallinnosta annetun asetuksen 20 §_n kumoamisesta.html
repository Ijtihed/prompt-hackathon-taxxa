<h1>Valtioneuvoston asetus poliisin hallinnosta annetun asetuksen 20 §:n kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan poliisin hallinnosta annetun asetuksen (158/1996) 20 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 18 päivänä toukokuuta 2015.</p>
