<h1>Valtioneuvoston asetus metsästysasetuksen 13 §:n kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan metsästysasetuksen (666/1993) 13 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä syyskuuta 2015.</p>
