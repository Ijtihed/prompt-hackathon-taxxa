<h1>Valtioneuvoston asetus rikosrekisteriasetuksen eräiden säännösten kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan rikosrekisteriasetuksen (772/1993) 2, 3 ja 12 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä helmikuuta 2013.</p>
